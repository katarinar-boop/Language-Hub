}
function normalizeData(){
  ["ja","ko"].forEach(function(L){ if(!DB[L])DB[L]={levels:[],cards:[]}; if(!DB[L].levels)DB[L].levels=[]; DB[L].cards=DB[L].cards||[]; DB[L].cards.forEach(function(c){ if(!c.id)c.id=uid(); }); });
  ["ja","ko"].forEach(function(L){ if(!PROG[L])PROG[L]=blankProg(); if(!PROG[L].cards)PROG[L].cards={}; if(!PROG[L].studied)PROG[L].studied={}; if(!PROG[L].passed)PROG[L].passed={}; });
}
function blankProg(){ return {bestDay:0,studied:{},today:-1,todayCount:0,cards:{},passed:{}}; }
function autosave(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify({data:DB,prog:PROG,ui:{lang:UI.lang,view:UI.view,theme:UI.theme,romaji:!!UI.romaji,autospeak:!!UI.autospeak,goal:UI.goal},at:Date.now()})); }catch(e){}
}
var _saveT=null;
function persist(){ if(fileHandle){ writeToFile().then(function(ok){ if(!ok) autosave(); }); } else { autosave(); } }
function scheduleSave(){ if(_saveT)clearTimeout(_saveT); _saveT=setTimeout(persist,600); }
function flashSaved(msg){ var s=document.getElementById("saved"); if(!s)return; s.textContent=msg; s.style.display="inline"; clearTimeout(flashSaved._t); flashSaved._t=setTimeout(function(){ s.style.display="none"; },1800); }

/* Honest CEFR mapping: these are intro courses, so they sit in the A1–A2 range only. Official CEFR terms only. */
function cefrFor(levelName){
  var n=String(levelName).toLowerCase();
  if(/level\s*8/.test(n)) return {t:"Upper-intermediate",c:"B2"};
  if(/level\s*6|level\s*7/.test(n)) return {t:"Intermediate",c:"B1"};
  if(/level\s*4|level\s*5/.test(n)) return {t:"Pre-intermediate",c:"A2–B1"};
  if(/level\s*2|level\s*3/.test(n)) return {t:"Elementary",c:"A2"};
  return {t:"Beginner",c:"A1"};   /* Survival, Beginner, Hangul, Level 1 */
}
function isPassed(l){ var p=PROG[UI.lang].passed||{}; return !!(p[l]&&p[l].passed); }
function passScore(l){ var p=PROG[UI.lang].passed||{}; return (p[l]&&p[l].best)||0; }
function passedCount(){ var n=0; levels().forEach(function(l){ if(isPassed(l)) n++; }); return n; }
function highestPassed(){ var h=null; levels().forEach(function(l){ if(isPassed(l)) h=l; }); return h; }
function skill(){ var h=highestPassed(); return h?cefrFor(h):{t:"New beginner",c:"Pre-A1"}; }
function nextUnpassed(){ var ls=levels(); for(var i=0;i<ls.length;i++){ if(!isPassed(ls[i])) return ls[i]; } return null; }

function cards(){ return DB[UI.lang].cards; }
function levels(){ return DB[UI.lang].levels; }
function findCard(id){ var a=cards(); for(var i=0;i<a.length;i++) if(a[i].id===id) return a[i]; return null; }
function srs(id){ var p=PROG[UI.lang].cards; if(!p[id]) p[id]={box:0,due:0,seen:0,right:0}; return p[id]; }
function speechLang(){ return UI.lang==="ja"?"ja-JP":"ko-KR"; }
function catsOf(level){ var seen={},out=[]; cards().forEach(function(c){ if(c.level===level && !seen[c.cat]){ seen[c.cat]=1; out.push(c.cat); } }); return out; }

/* ============ SPEECH ============ */
function speak(t){
  if(!t || typeof window.speechSynthesis==="undefined") return;
  try{ window.speechSynthesis.cancel(); var u=new SpeechSynthesisUtterance(String(t)); u.lang=speechLang();
    var want=speechLang().slice(0,2).toLowerCase(), vs=window.speechSynthesis.getVoices()||[];
    for(var i=0;i<vs.length;i++){ if((vs[i].lang||"").toLowerCase().indexOf(want)===0){ u.voice=vs[i]; break; } }
    window.speechSynthesis.speak(u);
  }catch(e){}
}
function speakCard(id){ var c=findCard(id); if(c) speak(c.item); }

function applyTheme(key){
  var p=PALETTES[key]||PALETTES.peony, r=document.documentElement;
  for(var k in p.vars) r.style.setProperty("--"+k,p.vars[k]);
  r.style.setProperty("--btn", p.btn || "linear-gradient(120deg,var(--lav-ink),var(--pink-ink))");
  r.style.setProperty("--cur-border", p.curBorder || "var(--lav-deep)");
  document.body.style.background=p.bg;
  UI.theme=key;
  document.querySelectorAll("#palrow .sw").forEach(function(b){ b.classList.toggle("on",b.getAttribute("data-p")===key); });
  if(typeof _inited!=="undefined" && _inited) scheduleSave();
}

/* ============ PROGRESS HELPERS ============ */
function masteredIn(level){ var n=0; cards().forEach(function(c){ if(c.level===level && srs(c.id).box>=MASTER_BOX) n++; }); return n; }
function totalIn(level){ var n=0; cards().forEach(function(c){ if(c.level===level) n++; }); return n; }
function dueCount(level){ var t=today(),n=0; cards().forEach(function(c){ if((level==null||c.level===level)){ var s=PROG[UI.lang].cards[c.id]; if(!s||s.due<=t) n++; } }); return n; }
function dayStreak(){ var st=PROG[UI.lang].studied,d=today(),n=0; while(st[d]){ n++; d--; } return n; }
function currentLevel(){ var ls=levels(); for(var i=0;i<ls.length;i++){ if(totalIn(ls[i])>0 && masteredIn(ls[i])<totalIn(ls[i])) return ls[i]; } return ls[ls.length-1]||null; }
function markStudied(){ var p=PROG[UI.lang],t=today(); p.studied[t]=1; if(p.today!==t){ p.today=t; p.todayCount=0; } p.todayCount++; var ds=dayStreak(); if(ds>p.bestDay) p.bestDay=ds; }

/* ============ PRACTICE ============ */
function poolFor(){
  return cards().filter(function(c){ return c.level===pr.level && (pr.topic==="All"||c.cat===pr.topic); });
}
function buildDeck(){
  var t=today(), pool=poolFor().slice();
  pool.sort(function(a,b){
    var sa=PROG[UI.lang].cards[a.id], sb=PROG[UI.lang].cards[b.id];
    var da=(!sa||sa.due<=t)?0:1, dbb=(!sb||sb.due<=t)?0:1;
    if(da!==dbb) return da-dbb;
    var ba=sa?sa.box:0, bb=sb?sb.box:0;
    if(ba!==bb) return ba-bb;
    return Math.random()-0.5;
  });
  pr.deck=pool.slice(0,SESSION_MAX).map(function(c){ return c.id; });
  pr.i=0; pr.revealed=false; pr.answered=false; pr.combo=0; pr.right=0; pr.total=0;
}
function setMode(m){ pr.mode=m; buildDeck(); renderPractice(); }
function setLevel(l){ pr.level=l; pr.topic="All"; buildDeck(); renderPractice(); }
function setTopic(t){ pr.topic=t; buildDeck(); renderPractice(); }

function norm(s){ return String(s==null?"":s).toLowerCase().replace(/\(.*?\)/g,"").replace(/[\s.\-—・,，。!?'’]/g,"").trim(); }
function readingVariants(c){ return String(c.reading||"").split(/[\/・]/).map(function(x){return x.trim();}).filter(Boolean); }
function meaningVariants(c){ return String(c.meaning||"").split(/[\/,]/).map(function(x){return x.trim();}).filter(Boolean); }
function acceptableSet(c){
  var arr=[]; if(c.item)arr.push(c.item);
  readingVariants(c).forEach(function(x){arr.push(x);});
  if(c.type==="vocab"||c.type==="grammar") meaningVariants(c).forEach(function(x){arr.push(x);});
  var set={}; arr.forEach(function(x){ set[norm(x)]=1; }); return set;
}
function frontText(c){ if(pr.mode==="listen") return "🔊"; if(c.type==="grammar") return c.q||c.item; return c.item; }
function frontBig(c){ return pr.mode!=="listen" && !(c.type==="grammar"); }
function optionField(c){ if(pr.mode==="listen") return c.item; if(c.type==="char") return c.reading; if(c.type==="grammar") return c.item; return c.meaning; }
function hl(s){ return esc(s).replace(/\*\*([^*]+)\*\*/g,'<b class="hl">$1</b>'); }
function boldFocus(escaped, focus){
  if(!focus) return escaped;
  focus.split("|").forEach(function(f){ f=esc(f.trim()); if(!f) return;
    var idx=escaped.indexOf(f);
    if(idx>=0){ escaped=escaped.slice(0,idx)+'<b class="hl">'+f+'</b>'+escaped.slice(idx+f.length); }
  });
  return escaped;
}
function answerBlock(c){
  var main,sub=esc(c.meaning);
  if(c.type==="char"){ main=esc(c.reading); }
  else { main=esc(c.item)+' <span class="romaji">('+esc(c.reading)+')</span>'; }
  var h='<div class="m">'+main+'</div>'; if(sub) h+='<div class="s">'+sub+'</div>';
  if(c.type==="grammar"){
    if(c.example) h+='<div class="ex">'+boldFocus(esc(c.example), c.focus||"")+'</div>';
  } else {
    var ex=""; if(c.notes) ex=esc(c.notes); if(c.example) ex=(ex?ex+" · ":"")+esc(c.example);
    if(ex) h+='<div class="ex">'+ex+'</div>';
  }
  return h;
}

function renderPractice(){
  var el=document.getElementById("practice");
  if(!pr.level) pr.level=currentLevel();
  var head;
  if(pr.exam){
    head='<div class="selrow"><span class="cap">🎓 Final exam · '+esc(pr.examLevel)+' · pass mark 90%</span>'
       + '<button class="opt" onclick="quitExam()">Quit exam</button></div>';
  } else {
    var modeLbl={flip:"Flip",mc:"Choice",type:"Type",listen:"Listen"}[pr.mode];
    var summary=esc(pr.level)+' · '+(pr.topic==="All"?"All":esc(pr.topic))+' · '+modeLbl;
    head='<button class="pctoggle" onclick="togglePControls()"><span>Change level / topic / mode</span><span class="tsum">'+summary+' ▾</span></button>';
    head+='<div id="pcontrols" class="pcontrols'+(pcOpen?' open':'')+'"><div class="selrow"><span class="cap">Level</span>';
    levels().forEach(function(l){ head+='<button class="opt'+(l===pr.level?' on':'')+'" onclick="setLevel('+JSON.stringify(l).replace(/"/g,"&quot;")+')">'+esc(l)+'</button>'; });
    head+='</div><div class="selrow"><span class="cap">Topic</span><button class="opt'+(pr.topic==="All"?' on':'')+'" onclick="setTopic(\'All\')">All</button>';
    catsOf(pr.level).forEach(function(t){ head+='<button class="opt'+(t===pr.topic?' on':'')+'" onclick="setTopic('+JSON.stringify(t).replace(/"/g,"&quot;")+')">'+esc(t)+'</button>'; });
    head+='</div><div class="selrow modes"><span class="cap">Mode</span>';
    [["flip","Flip"],["mc","Choice"],["type","Type"],["listen","Listen"]].forEach(function(m){
      head+='<button class="opt'+(pr.mode===m[0]?' on':'')+'" onclick="setMode(\''+m[0]+'\')">'+m[1]+'</button>';
    });
    head+='</div></div>';
  }

  if(!pr.exam && !pr.deck.length) buildDeck();
  if(!pr.deck.length){ el.innerHTML=head+'<div class="pcard"><div class="empty">No cards in this selection yet. Add some in Browse.</div></div>'; return; }

  if(pr.i>=pr.deck.length){
    if(pr.exam){
      var pct=pr.total?Math.round(pr.right/pr.total*100):0, passed=pct>=90, lvl=pr.examLevel, jl=JSON.stringify(lvl).replace(/"/g,"&quot;");
      var pp=PROG[UI.lang].passed||(PROG[UI.lang].passed={}), rec=pp[lvl]||{best:0,passed:false};
      if(pct>rec.best) rec.best=pct; if(passed) rec.passed=true; pp[lvl]=rec; pr.exam=false; pr.deck=[]; scheduleSave();
      el.innerHTML='<div class="done-c"><div class="big-emo">'+(passed?'🎓':'🌱')+'</div>'
       +'<h3>'+(passed?'You passed '+esc(lvl)+'!':'So close!')+'</h3>'
       +'<div class="subhello" style="margin:6px 0 16px">Exam score <b>'+pct+'%</b> · '
       +(passed?'level cleared — your skill rank just updated on Home. 🌸':'you need 90% to pass. A little more practice and retake it.')+'</div>'
       +'<div class="prow"><button class="pb flip" onclick="startExam('+jl+')">Retake exam</button>'
       +'<button class="pb ghost" onclick="setView(\'home\')">Back to home</button></div></div>';
      return;
    }
    var acc=pr.total?Math.round(pr.right/pr.total*100):0;
    el.innerHTML=head+'<div class="done-c"><div class="big-emo">🌷</div><h3>Session complete!</h3>'
     +'<div class="subhello" style="margin:6px 0 16px">You reviewed <b>'+pr.total+'</b> cards · <b>'+acc+'%</b> correct. Your garden grew!</div>'
     +'<div class="prow"><button class="pb flip" onclick="buildDeck();renderPractice()">Practise again</button>'
     +'<button class="pb ghost" onclick="setView(\'home\')">Back to home</button></div>';
    return;
  }

  var c=findCard(pr.deck[pr.i]);
  var hintText = pr.mode==="listen"?"Listen — which one did you hear?":(c.type==="char"?"What sound is this?":(c.type==="grammar"?"Give the form:":"What does it mean?"));
  var h=head+'<div class="pcard"><div class="ptop"><span class="bd">'+esc(pr.level)+' · '+esc(c.cat)+'</span>'
   + (pr.combo>=2?'<span class="combo">🔥 '+pr.combo+' combo</span>':'')
   + '<span class="ct">'+(pr.i+1)+' / '+pr.deck.length+'</span></div>'
   + '<div class="pbar"><i style="width:'+Math.round(pr.i/pr.deck.length*100)+'%"></i></div>'
   + '<div class="big'+(frontBig(c)?'':' small')+'"'+(pr.mode==="flip"?' style="cursor:pointer" onclick="if(!pr.revealed)flipReveal()"':'')+'>'+esc(frontText(c))+'</div>'
   + '<div class="hint" id="p-hint">'+hintText+'</div>'
   + '<button class="listen" onclick="speakCard(\''+c.id+'\')">🔊 listen</button>';

  if(pr.mode==="flip"){
    h+='<div class="ans hidden" id="p-ans">'+answerBlock(c)+'</div>'
     + '<div class="prow"><button class="pb flip" id="p-flip" onclick="flipReveal()">Show answer</button>'
     + '<span id="p-judge" class="hidden"><button class="pb ok" onclick="grade(true)">✓ Got it</button> <button class="pb no" onclick="grade(false)">✕ Missed</button></span></div>'
     + '<div class="swiptip" id="p-swiptip">tap card to flip · swipe → got it · swipe ← missed</div>'
     + '<div class="kbd">shortcuts · <b>space</b> flip · <b>←</b> missed · <b>→</b> got it</div>';
  } else if(pr.mode==="mc"||pr.mode==="listen"){
    h+='<div class="choices" id="p-choices">'+mcChoices(c)+'</div>'
     + '<div class="ans hidden" id="p-ans">'+answerBlock(c)+'</div>'
     + '<div class="prow"><button class="pb flip hidden" id="p-next" onclick="advance()">Next →</button></div>'
     + '<div class="kbd">shortcuts · <b>1</b>–<b>4</b> pick · <b>enter</b> or <b>→</b> next</div>';
  } else { /* type */
    h+='<div class="typebox"><input id="p-input" placeholder="type your answer" autocomplete="off" onkeydown="if(event.key===\'Enter\')checkType()"><button class="pb flip" onclick="checkType()">Check</button></div>'
     + '<div class="ans hidden" id="p-ans">'+answerBlock(c)+'</div>'
     + '<div class="prow"><button class="pb flip hidden" id="p-next" onclick="advance()">Next →</button></div>'
     + '<div class="kbd">shortcuts · <b>enter</b> to check, then <b>enter</b> or <b>→</b> for next</div>';
  }
  h+='</div>';
  el.innerHTML=h;
  if(pr.mode==="listen") speakCard(c.id);
  if(pr.mode==="type"){ var inp=document.getElementById("p-input"); if(inp) inp.focus(); }
}

function mcChoices(c){
  var correct=optionField(c);
  var poolAll=cards().filter(function(x){ return x.id!==c.id && x.type===c.type && optionField(x) && optionField(x)!==correct; });
  var seen={},dis=[]; shuffle(poolAll);
  for(var i=0;i<poolAll.length && dis.length<3;i++){ var v=optionField(poolAll[i]); if(!seen[v]){ seen[v]=1; dis.push(v); } }
  var opts=dis.concat([correct]); shuffle(opts);
  return opts.map(function(o,idx){ return '<button class="choice" data-v="'+esc(o).replace(/"/g,"&quot;")+'" onclick="pickChoice(this,'+JSON.stringify(correct).replace(/"/g,"&quot;")+')"><span class="cnum">'+(idx+1)+'</span>'+esc(o)+'</button>'; }).join("");
}
function pickChoice(btn,correct){
  if(pr.answered) return; pr.answered=true;
  var ok=(btn.getAttribute("data-v")===String(correct));
  document.querySelectorAll("#p-choices .choice").forEach(function(b){
    if(b.getAttribute("data-v")===String(correct)) b.classList.add("right");
    else if(b===btn) b.classList.add("wrong");
    b.style.pointerEvents="none";
  });
  reveal(ok);
}
function checkType(){
  if(pr.answered) return; var inp=document.getElementById("p-input"); if(!inp) return;
  var c=findCard(pr.deck[pr.i]); var ok=!!acceptableSet(c)[norm(inp.value)];
  pr.answered=true; inp.disabled=true; inp.style.boxShadow="0 0 0 2px "+(ok?"var(--mint-deep)":"var(--peach-deep)");
  reveal(ok);
}
function reveal(ok){
  var a=document.getElementById("p-ans"); if(a) a.classList.remove("hidden");
  var n=document.getElementById("p-next"); if(n) n.classList.remove("hidden");
  var hint=document.getElementById("p-hint"); if(hint) hint.textContent = ok?"✓ Correct!":"✕ Not quite";
  var c=findCard(pr.deck[pr.i]);
  applyGrade(ok);
  if(UI.autospeak && c) speak(c.item);
}
function flipReveal(){
  pr.revealed=true;
  var a=document.getElementById("p-ans"); if(a) a.classList.remove("hidden");
  var f=document.getElementById("p-flip"); if(f) f.classList.add("hidden");
  var j=document.getElementById("p-judge"); if(j) j.classList.remove("hidden");
  var hint=document.getElementById("p-hint"); if(hint) hint.textContent="Did you get it?";
  var c=findCard(pr.deck[pr.i]); if(UI.autospeak && c) speak(c.item);
}
function applyGrade(ok){
  var c=findCard(pr.deck[pr.i]), s=srs(c.id), t=today();
  s.seen++; if(ok){ s.right++; s.box=Math.min(s.box+1,5); pr.combo++; pr.right++; } else { s.box=0; pr.combo=0; }
  s.due=t+INTERVALS[s.box];
  pr.total++;
  markStudied();
  scheduleSave();
}
function grade(ok){ if(pr.answered) return; pr.answered=true; applyGrade(ok);
  var card=document.querySelector(".pcard"); advance(); }
function advance(){ pr.i++; pr.revealed=false; pr.answered=false; renderPractice(); }

function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)),t=a[i];a[i]=a[j];a[j]=t; } return a; }

/* ============ LESSON ============ */
var lessonLevel=null;
function openLesson(l){ lessonLevel=l; UI.view="lesson"; renderTopbar(); render(); window.scrollTo({top:0,behavior:"smooth"}); }
function lSetLevel(l){ lessonLevel=l; renderLesson(); }
function renderLesson(){
  var el=document.getElementById("lesson");
  if(!lessonLevel) lessonLevel=currentLevel();
  var head='<div class="selrow"><span class="cap">Lesson · Level</span>';
  levels().forEach(function(l){ head+='<button class="opt'+(l===lessonLevel?' on':'')+'" onclick="lSetLevel('+JSON.stringify(l).replace(/"/g,"&quot;")+')">'+esc(l)+'</button>'; });
  head+='</div>';
  var gs=cards().filter(function(c){ return c.level===lessonLevel && c.type==="grammar"; });
  if(!gs.length){
    el.innerHTML=head+'<div class="pcard"><div class="empty">This level is about learning the characters and vocabulary — there are no grammar patterns to introduce here yet. Head to Practise or Browse.</div></div>';
    return;
  }
  var cats=[], seen={}; gs.forEach(function(c){ if(!seen[c.cat]){ seen[c.cat]=1; cats.push(c.cat); } });
  var h=head+'<div class="lesson-intro">New forms &amp; phrases in <b>'+esc(lessonLevel)+'</b>. Read these first, then head to <b>Practise</b> to drill them.</div>';
  cats.forEach(function(cat){
    h+='<div class="lsec"><h3><span class="ldot"></span>'+esc(cat)+'</h3>';
    gs.filter(function(c){ return c.cat===cat; }).forEach(function(c){
      h+='<div class="lform"><div class="lhead"><span class="lterm">'+esc(c.item)+'</span>'
        +'<span class="lread romaji">'+esc(c.reading)+'</span><span class="lmean">— '+esc(c.meaning)+'</span>'
        +'<button class="spk" title="Pronounce" onclick="speakCard(\''+c.id+'\')">🔊</button></div>';
      if(c.notes) h+='<div class="luse">'+hl(c.notes)+'</div>';
      if(c.example) h+='<div class="lex">'+boldFocus(esc(c.example), c.focus||"")+'</div>';
      h+='</div>';
    });
    h+='</div>';
  });
  el.innerHTML=h;
}

/* ============ BROWSE ============ */
var brLevel=null, brTopic="All";
function renderBrowse(){
  var el=document.getElementById("browse");
  if(!brLevel) brLevel=levels()[0];
  var h='<div class="browse-top"><select onchange="brSetLevel(this.value)">'
   + levels().map(function(l){ return '<option'+(l===brLevel?' selected':'')+'>'+esc(l)+'</option>'; }).join("")
   + '</select><select onchange="brSetTopic(this.value)"><option'+(brTopic==="All"?' selected':'')+'>All</option>'
   + catsOf(brLevel).map(function(t){ return '<option'+(t===brTopic?' selected':'')+'>'+esc(t)+'</option>'; }).join("")
   + '</select><button class="badd" onclick="addCardBrowse()">+ Add card</button></div>';
  var list=cards().filter(function(c){ return c.level===brLevel && (brTopic==="All"||c.cat===brTopic); });
  if(!list.length){ el.innerHTML=h+'<div class="rowlist"><div class="empty">No cards here yet. Use “+ Add card”.</div></div>'; return; }
  h+='<div class="rowlist">';
  list.forEach(function(c){
    h+='<div class="brow">'
     + '<div class="ch" contenteditable="true" data-id="'+c.id+'" data-f="item" data-ph="term" oninput="edit(this)">'+esc(c.item)+'</div>'
     + '<div class="rd romaji" contenteditable="true" data-id="'+c.id+'" data-f="reading" data-ph="reading" oninput="edit(this)">'+esc(c.reading)+'</div>'
     + '<div class="mn" contenteditable="true" data-id="'+c.id+'" data-f="meaning" data-ph="meaning" oninput="edit(this)">'+esc(c.meaning)+'</div>'
     + '<div class="ex" contenteditable="true" data-id="'+c.id+'" data-f="example" data-ph="example…" oninput="edit(this)">'+esc(c.example)+'</div>'
     + '<button class="sp" onclick="speakCard(\''+c.id+'\')">🔊</button>'
     + '<button class="del" onclick="delCard(\''+c.id+'\')">✕</button></div>';
  });
  h+='</div>';
  el.innerHTML=h;
}
function brSetLevel(v){ brLevel=v; brTopic="All"; renderBrowse(); }
function brSetTopic(v){ brTopic=v; renderBrowse(); }
function edit(elm){ var c=findCard(elm.getAttribute("data-id")); if(c){ c[elm.getAttribute("data-f")]=(elm.innerText!=null?elm.innerText:elm.textContent).trim(); scheduleSave(); } }
function addCardBrowse(){
  var t=(brTopic==="All"?(catsOf(brLevel)[0]||"Vocabulary"):brTopic);
  var typ=/hira|kata|hangul|consonant|vowel|kanji/i.test(t)?"char":(/gramm|particle|conjug/i.test(t)?"grammar":"vocab");
  var c={id:uid(),level:brLevel,cat:t,type:typ,item:"",reading:"",meaning:"",example:"",notes:"",q:"",focus:""};
  cards().push(c); renderBrowse(); scheduleSave();
}
function delCard(id){ var c=findCard(id); if(!c) return; if(!confirm('Delete "'+(c.item||"this card")+'"?')) return;
  DB[UI.lang].cards=cards().filter(function(x){ return x.id!==id; }); renderBrowse(); scheduleSave(); }

/* ============ SAVE ============ */
function setBlock(id,obj){ document.getElementById(id).textContent=JSON.stringify(obj).replace(/</g,"\\u003c"); }
function buildDocHTML(){
  setBlock("hub-data",DB); setBlock("hub-progress",PROG);
  setBlock("hub-state",{lang:UI.lang,view:UI.view,theme:UI.theme,romaji:!!UI.romaji,autospeak:!!UI.autospeak,goal:UI.goal,at:Date.now()});
  return "<!DOCTYPE html>\n"+document.documentElement.outerHTML;
}
// Save button: connect to your file (first time) then write straight into it; falls back to download.
function saveHub(){
  if(_fsSupported){
    if(fileHandle){ writeToFile().then(function(ok){ flashSaved(ok?"Saved to your file ✓":"Couldn't write — click Save to reconnect"); if(!ok) fileHandle=null, updateSaveLabel(); }); }
    else connectFile();
  } else { downloadBackup(); }
}
async function connectFile(){
  try{
    fileHandle=await window.showSaveFilePicker({suggestedName:"language_study_hub.html",types:[{description:"Language Study Hub",accept:{"text/html":[".html"]}}]});
    var ok=await writeToFile();
    if(ok){ try{ await idbSet(fileHandle); }catch(e){} flashSaved("Auto-saving to your file ✓"); updateSaveLabel(); hideLinkBanner(); }
    else { fileHandle=null; }
  }catch(e){ /* user cancelled the picker */ }
}
async function writeToFile(){
  if(!fileHandle) return false;
  try{
    if(fileHandle.queryPermission){
      var p=await fileHandle.queryPermission({mode:"readwrite"});
      if(p!=="granted"){ p=await fileHandle.requestPermission({mode:"readwrite"}); if(p!=="granted") return false; }
    }
    var wr=await fileHandle.createWritable(); await wr.write(buildDocHTML()); await wr.close();
    autosave(); // keep the localStorage mirror fresh too
    return true;
  }catch(e){ return false; }
}
function downloadBackup(){
  var blob=new Blob([buildDocHTML()],{type:"text/html"}), a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download="language_study_hub.html";
  document.body.appendChild(a); a.click(); a.remove(); flashSaved("Backup downloaded ✓");
}
function updateSaveLabel(){ var b=document.getElementById("saveBtn"); if(b) b.textContent = fileHandle ? "💾 Save to file" : "💾 Save"; }
function hideLinkBanner(){ var el=document.getElementById("linkbanner"); if(el) el.classList.remove("show"); }
function maybeShowLinkBanner(){ var el=document.getElementById("linkbanner"); if(el && _fsSupported && !fileHandle) el.classList.add("show"); }
function idbSet(h){ return new Promise(function(res,rej){ try{ var r=indexedDB.open("langhub_fs",1); r.onupgradeneeded=function(){ r.result.createObjectStore("kv"); }; r.onsuccess=function(){ try{ var tx=r.result.transaction("kv","readwrite"); tx.objectStore("kv").put(h,"fh"); tx.oncomplete=function(){res();}; tx.onerror=function(){rej();}; }catch(e){rej();} }; r.onerror=function(){rej();}; }catch(e){rej();} }); }
function idbGet(){ return new Promise(function(res){ try{ var r=indexedDB.open("langhub_fs",1); r.onupgradeneeded=function(){ r.result.createObjectStore("kv"); }; r.onsuccess=function(){ try{ var tx=r.result.transaction("kv","readonly"); var g=tx.objectStore("kv").get("fh"); g.onsuccess=function(){res(g.result||null);}; g.onerror=function(){res(null);}; }catch(e){res(null);} }; r.onerror=function(){res(null);}; }catch(e){res(null);} }); }
function toggleSettings(force){
  var m=document.getElementById("setmenu"); if(!m) return;
  var open=(typeof force==="boolean")?force:!m.classList.contains("open");
  m.classList.toggle("open",open);
}
function exportData(){
  var out={version:1,data:DB,prog:PROG,ui:{lang:UI.lang,view:UI.view,theme:UI.theme,romaji:!!UI.romaji,autospeak:!!UI.autospeak,goal:UI.goal},at:Date.now()};
  var blob=new Blob([JSON.stringify(out)],{type:"application/json"}), a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download="language_study_hub_progress.json";
  document.body.appendChild(a); a.click(); a.remove();
  flashSaved("Exported ✓");
}
function importData(input){
  var f=input && input.files && input.files[0]; if(!f) return;
  var rd=new FileReader();
  rd.onload=function(){
    try{
      var o=JSON.parse(rd.result); if(!o || !o.data) throw 0;
      DB=o.data; if(o.prog)PROG=o.prog; if(o.ui){ Object.keys(o.ui).forEach(function(k){ UI[k]=o.ui[k]; }); }
      normalizeData(); autosave();
      lib={cat:"All",id:null,q:""}; brLevel=null; brTopic="All"; lessonLevel=null; pr.exam=false; pr.level=null; pr.deck=[];
      applyTheme(UI.theme); syncToggles(); renderTopbar(); buildDeck(); render();
      flashSaved("Imported ✓");
    }catch(e){ flashSaved("Import failed ✗"); }
  };
  rd.readAsText(f); input.value="";
}

/* ============ TOUCH / SWIPE (mobile) ============ */
var _tx=0,_ty=0,_inCard=false;
document.addEventListener("touchstart",function(e){
  if(e.touches&&e.touches[0]){ _tx=e.touches[0].clientX; _ty=e.touches[0].clientY; _inCard=!!(e.target.closest&&e.target.closest(".pcard")); }
},{passive:true});
document.addEventListener("touchend",function(e){
  if(!_inCard || UI.view!=="practice" || pr.mode!=="flip" || pr.i>=pr.deck.length) return;
  if(!e.changedTouches||!e.changedTouches[0]) return;
  var dx=e.changedTouches[0].clientX-_tx, dy=e.changedTouches[0].clientY-_ty;
  if(Math.abs(dx)<55 || Math.abs(dx)<Math.abs(dy)*1.4) return;   // ignore taps & vertical scrolls
  if(!pr.revealed) flipReveal(); else grade(dx>0);
},{passive:true});

/* ============ KEYBOARD ============ */
document.addEventListener("keydown",function(e){
  if(UI.view!=="practice" || pr.i>=pr.deck.length) return;
  if(pr.mode==="flip"){
    if(e.code==="Space"){ e.preventDefault(); if(!pr.revealed) flipReveal(); }
    else if(e.key==="ArrowRight"){ if(pr.revealed) grade(true); }
    else if(e.key==="ArrowLeft"){ if(pr.revealed) grade(false); }
  } else if(pr.mode==="mc"||pr.mode==="listen"){
    if(!pr.answered && "1234".indexOf(e.key)>=0){
      var b=document.querySelectorAll("#p-choices .choice")[+e.key-1]; if(b) b.click();
    } else if(pr.answered && (e.key==="Enter"||e.key==="ArrowRight"||e.code==="Space")){ e.preventDefault(); advance(); }
  } else if(pr.mode==="type"){
    if(pr.answered && (e.key==="Enter"||e.key==="ArrowRight")){ e.preventDefault(); advance(); }
  }
});

/* ============ INIT ============ */
var _inited=false;
function init(){
  loadAll(); buildPalRow(); applyTheme(UI.theme); syncToggles(); renderTopbar();
  pr.level=currentLevel();
  render();
  if(typeof window.speechSynthesis!=="undefined"){ window.speechSynthesis.getVoices(); window.speechSynthesis.onvoiceschanged=function(){ window.speechSynthesis.getVoices(); }; }
  _inited=true;
  maybeShowLinkBanner();
  window.addEventListener("beforeunload", autosave);
  document.addEventListener("click", function(e){ var t=document.getElementById("tools"); if(t && !t.contains(e.target)) toggleSettings(false); });
}
init();
</script>
