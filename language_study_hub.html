<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Study Hub · 日本語 / 한국어</title>
<style>
  :root{
    --lav:#e7e0f0; --lav-deep:#c9b6e0; --lav-ink:#7a5ea8;
    --mint:#dfeadd; --mint-deep:#b6d3b0; --mint-ink:#5f8f66;
    --peach:#fbe6d6; --peach-deep:#f6c9a6; --peach-ink:#cf8a52;
    --pink:#f8dfe6; --pink-deep:#f2b8c6; --pink-ink:#c96a84;
    --blue:#e3e8f4; --blue-deep:#bccbe8; --blue-ink:#5f77b0;
    --ink:#4a4550; --soft:#8b8494; --paper:#f7f3ee; --card:#fff; --line:#ece3d8;
    --sh:0 10px 30px rgba(150,130,170,.16); --sh-sm:0 6px 16px rgba(150,130,170,.12);
    --btn:linear-gradient(120deg,var(--lav-ink),var(--pink-ink)); --cur-border:var(--lav-deep);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{font-family:"Segoe UI","Nunito",-apple-system,BlinkMacSystemFont,sans-serif;color:var(--ink);line-height:1.5;
    background:
      radial-gradient(1200px 520px at 6% -6%, #ece3f5 0%, transparent 60%),
      radial-gradient(1000px 520px at 100% 0%, #fbe2ea 0%, transparent 55%),
      radial-gradient(900px 500px at 50% 108%, #e6efe2 0%, transparent 60%),
      linear-gradient(180deg,#f7f3ee,#f6f1f0);
    min-height:100vh;padding:18px 16px 96px;}
  .romaji-hidden .romaji{display:none !important;}
  .wrap{max-width:940px;margin:0 auto;}
  #linkbanner{display:none;align-items:center;gap:10px;flex-wrap:wrap;background:var(--lav);color:var(--lav-ink);border-radius:14px;padding:10px 15px;margin-bottom:14px;font-size:13px;font-weight:700;box-shadow:var(--sh-sm);}
  #linkbanner.show{display:flex;}
  #linkbanner button{border:none;cursor:pointer;font-family:inherit;background:#fff;color:var(--lav-ink);font-weight:800;border-radius:10px;padding:7px 13px;box-shadow:var(--sh-sm);}
  #linkbanner button.x{background:transparent;box-shadow:none;opacity:.65;padding:6px 8px;}

  .bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
  .brand{font-weight:800;font-size:20px;background:linear-gradient(100deg,var(--lav-ink),var(--pink-ink));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .spacer{flex:1;}
  .pillrow{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:999px;padding:5px;box-shadow:var(--sh-sm);gap:4px;}
  .pillrow button{border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:13.5px;color:var(--soft);background:transparent;padding:8px 15px;border-radius:999px;}
  .pillrow.lang button.on{background:linear-gradient(120deg,var(--lav),var(--pink));color:var(--lav-ink);box-shadow:var(--sh-sm);}
  .nav{display:inline-flex;gap:4px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:5px;box-shadow:var(--sh-sm);}
  .nav button{border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:13.5px;color:var(--soft);background:transparent;padding:8px 16px;border-radius:999px;}
  .nav button.on{background:var(--btn);color:#fff;box-shadow:var(--sh-sm);}

  .subbar{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
  .palrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .palrow .lab,.toggles .lab{font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);}
  .sw{cursor:pointer;border:2px solid #fff;border-radius:999px;padding:5px 11px 5px 7px;background:#fff;box-shadow:var(--sh-sm);display:inline-flex;align-items:center;gap:7px;font-family:inherit;font-weight:800;font-size:12px;color:var(--ink);}
  .sw.on{border-color:var(--lav-deep);}
  .sw .dab{width:30px;height:15px;border-radius:999px;flex:none;}
  .toggles{display:inline-flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .tog{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 12px;box-shadow:var(--sh-sm);font-size:12px;font-weight:700;color:var(--soft);cursor:pointer;user-select:none;}
  .tog input{accent-color:var(--lav-ink);width:14px;height:14px;cursor:pointer;}

  .screen{display:none;} .screen.on{display:block;}

  .hello{font-size:25px;font-weight:800;margin:4px 0 2px;}
  .hello .jp{color:var(--lav-ink);}
  .skill{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:6px 0 4px;}
  .skill .pill{font-size:13px;font-weight:800;color:var(--lav-ink);background:var(--lav);border-radius:999px;padding:6px 14px;box-shadow:var(--sh-sm);}
  .skill .pill em{font-style:normal;font-weight:800;opacity:.7;}
  .skill .nextup{font-size:12px;color:var(--soft);font-weight:700;}
  .subhello{color:var(--soft);font-size:14px;margin-bottom:18px;}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:26px;}
  .stat{background:#fff;border:1px solid var(--line);border-radius:20px;padding:15px 16px;box-shadow:var(--sh-sm);display:flex;align-items:center;gap:12px;}
  .stat .ic{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;flex:none;}
  .stat .l{font-size:10.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--soft);}
  .stat .v{font-size:23px;font-weight:800;line-height:1.1;}
  .i-pink{background:var(--pink);} .i-mint{background:var(--mint);} .i-lav{background:var(--lav);}

  .sec-h{display:flex;align-items:center;gap:10px;margin:0 0 14px;}
  .sec-h h2{font-size:16px;font-weight:800;margin:0;}
  .sec-h .line{flex:1;height:1px;background:var(--line);}

  .path{display:flex;flex-direction:column;gap:13px;}
  .lvl{display:flex;align-items:center;gap:15px;background:#fff;border:1px solid var(--line);border-radius:22px;padding:15px 17px;box-shadow:var(--sh-sm);flex-wrap:wrap;}
  .lvl.cur{border:2px solid var(--cur-border);}
  .ring{width:54px;height:54px;flex:none;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:800;color:var(--lav-ink);}
  .ring .inner{width:40px;height:40px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;}
  .lvl .meta{flex:1;min-width:160px;}
  .lvl .nm{font-size:15.5px;font-weight:800;display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
  .tag{font-size:9.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;border-radius:999px;}
  .tag.now{background:var(--lav);color:var(--lav-ink);} .tag.done{background:var(--mint);color:var(--mint-ink);}
  .lvl .dsc{font-size:12px;color:var(--soft);margin-top:2px;}
  .garden{margin-top:6px;font-size:14px;letter-spacing:1px;line-height:1.3;}
  .garden .none{font-size:11.5px;color:var(--soft);font-style:italic;letter-spacing:0;}
  .lvlbtns{display:flex;gap:8px;flex:none;}
  .go{border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:13px;color:#fff;background:var(--btn);padding:10px 16px;border-radius:12px;box-shadow:var(--sh-sm);}
  .go.ghost{background:#fff;color:var(--lav-ink);border:1px solid var(--line);}

  .selrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;align-items:center;}
  .selrow .cap{font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--soft);width:100%;}
  .opt{border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:12.5px;padding:8px 13px;border-radius:999px;background:#fff;color:var(--soft);box-shadow:var(--sh-sm);border:1px solid var(--line);}
  .opt.on{background:var(--lav-ink);color:#fff;border-color:var(--lav-ink);}
  .modes{margin:10px 0 18px;}

  .pcard{background:#fff;border:1px solid var(--line);border-radius:28px;box-shadow:var(--sh);padding:20px 22px 26px;text-align:center;max-width:580px;margin:0 auto;}
  .ptop{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .ptop .bd{font-size:10px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;background:var(--lav);color:var(--lav-ink);padding:5px 11px;border-radius:999px;}
  .ptop .combo{font-size:11.5px;font-weight:800;color:var(--pink-ink);}
  .ptop .ct{margin-left:auto;font-size:12px;font-weight:800;color:var(--soft);}
  .pbar{height:8px;border-radius:999px;background:var(--paper);overflow:hidden;margin:8px 0 18px;}
  .pbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--lav-deep),var(--pink-deep));transition:width .3s;}
  .big{font-size:82px;font-weight:800;line-height:1.05;margin:6px 0 6px;word-break:break-word;}
  .big.small{font-size:30px;padding:6px 4px;}
  .hint{color:var(--soft);font-size:13px;font-weight:700;min-height:18px;}
  .listen{border:none;cursor:pointer;font-size:13px;font-weight:800;background:var(--paper);border-radius:12px;padding:8px 14px;box-shadow:var(--sh-sm);margin-top:8px;}
  .ans{margin:15px auto 2px;}
  .ans .m{font-size:26px;font-weight:800;color:var(--lav-ink);}
  .ans .s{font-size:14px;color:var(--soft);font-weight:700;margin-top:3px;}
  .ans .use{font-size:13px;color:var(--ink);line-height:1.55;text-align:left;background:var(--lav);border-radius:14px;padding:11px 15px;margin:12px auto 0;max-width:500px;}
  .ans .use .hl{color:var(--lav-ink);font-weight:800;}
  .ans .ex{font-size:13.5px;color:var(--ink);margin-top:10px;background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:9px 14px;display:inline-block;}
  .ans .ex .hl{color:var(--pink-ink);font-weight:800;background:var(--pink);border-radius:5px;padding:0 3px;}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px auto 4px;max-width:460px;}
  .choice{position:relative;border:1px solid var(--line);background:#fff;cursor:pointer;font-family:inherit;font-weight:800;font-size:16px;color:var(--ink);padding:14px 10px 14px 30px;border-radius:15px;box-shadow:var(--sh-sm);}
  .choice .cnum{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:800;color:var(--soft);background:var(--paper);border-radius:6px;width:17px;height:17px;line-height:17px;text-align:center;}
  .choice.right{background:var(--mint);border-color:var(--mint-deep);color:var(--mint-ink);}
  .choice.wrong{background:var(--peach);border-color:var(--peach-deep);color:var(--peach-ink);}
  .typebox{display:flex;gap:9px;justify-content:center;margin:16px auto 4px;max-width:420px;}
  .typebox input{flex:1;font-family:inherit;font-size:17px;font-weight:700;color:var(--ink);border:1px solid var(--line);background:var(--paper);border-radius:13px;padding:12px 15px;outline:none;text-align:center;}
  .typebox input:focus{box-shadow:0 0 0 2px var(--lav-deep);}
  .prow{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px;}
  .pb{border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:15px;padding:13px 26px;border-radius:14px;box-shadow:var(--sh-sm);color:#fff;}
  .pb.flip{background:var(--btn);}
  .pb.ok{background:linear-gradient(120deg,var(--mint-deep),var(--mint-ink));}
  .pb.no{background:linear-gradient(120deg,var(--peach-deep),var(--peach-ink));}
  .pb.ghost{background:#fff;color:var(--lav-ink);border:1px solid var(--line);}
  .kbd{margin-top:14px;color:var(--soft);font-size:11px;}
  .kbd b{background:#fff;border:1px solid var(--line);border-radius:6px;padding:1px 6px;font-weight:800;color:var(--ink);}
  .hidden{display:none !important;}
  .done-c{max-width:560px;margin:0 auto;text-align:center;background:#fff;border:1px solid var(--line);border-radius:28px;box-shadow:var(--sh);padding:30px 24px;}
  .done-c .big-emo{font-size:44px;}
  .done-c h3{font-size:20px;margin:8px 0 4px;}

  .lesson-intro{color:var(--soft);font-size:13.5px;margin:2px 2px 18px;}
  .lsec{margin-bottom:22px;}
  .lsec h3{font-size:15px;font-weight:800;margin:0 0 11px;display:flex;align-items:center;gap:9px;}
  .lsec h3 .ldot{width:12px;height:12px;border-radius:5px;background:var(--lav-deep);flex:none;}
  .lform{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--sh-sm);padding:14px 16px;margin-bottom:11px;}
  .lhead{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
  .lhead .lterm{font-size:20px;font-weight:800;}
  .lhead .lread{font-size:14px;font-weight:800;color:var(--lav-ink);}
  .lhead .lmean{font-size:13.5px;color:var(--soft);font-weight:700;}
  .lhead .spk{margin-left:auto;}
  .luse{font-size:13.5px;line-height:1.6;color:var(--ink);margin-top:10px;}
  .luse .hl{color:var(--lav-ink);font-weight:800;}
  .lex{font-size:13.5px;color:var(--ink);margin-top:10px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:9px 13px;}
  .lex .hl{color:var(--pink-ink);font-weight:800;background:var(--pink);border-radius:5px;padding:0 3px;}
  .browse-top{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
  .browse-top select{font-family:inherit;font-weight:700;font-size:13px;color:var(--ink);border:1px solid var(--line);background:#fff;border-radius:12px;padding:9px 12px;box-shadow:var(--sh-sm);}
  .badd{border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:12.5px;color:var(--mint-ink);background:var(--mint);border-radius:12px;padding:9px 13px;box-shadow:var(--sh-sm);}
  .rowlist{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:var(--sh-sm);overflow:hidden;}
  .brow{display:flex;align-items:center;gap:13px;padding:12px 16px;border-bottom:1px solid var(--line);}
  .brow:last-child{border-bottom:none;}
  .brow .ch{font-size:24px;font-weight:800;min-width:52px;text-align:center;}
  .brow .rd{font-weight:800;color:var(--lav-ink);min-width:110px;}
  .brow .mn{flex:1;min-width:120px;color:var(--ink);}
  .brow .ex{flex:1;min-width:120px;color:var(--soft);font-size:12.5px;}
  .brow .sp{border:none;cursor:pointer;font-size:15px;background:var(--paper);border-radius:10px;padding:6px 10px;box-shadow:var(--sh-sm);}
  .brow .del{border:none;cursor:pointer;font-size:12px;font-weight:800;color:var(--peach-ink);background:#fff;border-radius:9px;padding:6px 9px;box-shadow:var(--sh-sm);}
  [contenteditable="true"]{cursor:text;border-radius:7px;outline:none;transition:background .15s,box-shadow .15s;}
  [contenteditable="true"]:hover{box-shadow:0 0 0 2px var(--lav-deep);}
  [contenteditable="true"]:focus{box-shadow:0 0 0 2px var(--lav-ink);background:#fff;}
  [contenteditable="true"]:empty::before{content:attr(data-ph);color:var(--soft);font-style:italic;opacity:.6;}
  .empty{color:var(--soft);font-size:13px;font-style:italic;padding:20px;text-align:center;}

  #tools{position:fixed;right:18px;bottom:18px;z-index:99;display:flex;gap:9px;align-items:center;background:#fff;padding:9px 11px;border-radius:16px;box-shadow:var(--sh);border:1px solid var(--line);}
  #tools .hint2{font-size:11px;color:var(--soft);max-width:120px;line-height:1.3;}
  #tools button{border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:13px;color:#fff;padding:10px 15px;border-radius:12px;box-shadow:var(--sh-sm);background:var(--btn);}
  #tools button.mini{background:#fff;color:var(--lav-ink);border:1px solid var(--line);padding:10px 12px;}
  #tools button.gear{font-size:16px;padding:9px 12px;}
  #saved{color:var(--mint-ink);font-weight:800;font-size:12px;display:none;align-self:center;}
  #setmenu{position:absolute;bottom:calc(100% + 8px);right:0;width:230px;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh);padding:12px;display:none;flex-direction:column;gap:8px;}
  #setmenu.open{display:flex;}
  #setmenu .setnote{font-size:11.5px;color:var(--soft);line-height:1.4;margin-bottom:2px;}
  #setmenu button{background:var(--paper);color:var(--ink);border:1px solid var(--line);font-weight:800;font-size:13px;padding:10px 12px;border-radius:11px;text-align:left;}
  #setmenu button:hover{background:var(--lav);color:var(--lav-ink);}

  .pctoggle{display:none;align-items:center;justify-content:space-between;gap:8px;width:100%;border:1px solid var(--line);background:#fff;color:var(--ink);font-family:inherit;font-weight:800;font-size:13px;padding:10px 14px;border-radius:13px;box-shadow:var(--sh-sm);margin-bottom:8px;cursor:pointer;}
  .pctoggle .tsum{color:var(--lav-ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .swiptip{display:none;text-align:center;font-size:11px;color:var(--soft);margin-top:9px;}
  @media(max-width:720px){
    body{padding:10px 10px 80px;}
    .stats{grid-template-columns:1fr;}
    .brow .ex{display:none;}
    /* trim the top chrome */
    .bar{gap:8px;margin-bottom:8px;}
    .brand{font-size:17px;}
    .nav button,.pillrow button{padding:7px 12px;font-size:13px;}
    .subbar{margin-bottom:8px;gap:6px;flex-direction:column;align-items:stretch;}
    .palrow{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;justify-content:flex-start;}
    .palrow::-webkit-scrollbar{display:none;}
    .palrow .sw{flex:0 0 auto;}
    .toggles{justify-content:center;gap:7px;}
    .hello{font-size:21px;}
    /* Level/Topic/Mode collapse behind one tappable bar */
    .pctoggle{display:flex;}
    .pcontrols{display:none;}
    .pcontrols.open{display:block;}
    .selrow{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:3px;margin-bottom:6px;}
    .selrow::-webkit-scrollbar{display:none;}
    .selrow .cap{width:auto;white-space:nowrap;}
    .opt{flex:0 0 auto;}
    /* compact card — normal sizing, not oversized */
    .pcard{padding:13px 13px 16px;border-radius:20px;}
    .big{font-size:42px;margin:2px 0 4px;}
    .big.small{font-size:21px;}
    .hint{font-size:12px;min-height:0;}
    .kbd{display:none;}
    .listen{margin-top:5px;padding:7px 12px;}
    .ans{margin:9px auto 2px;} .ans .m{font-size:21px;} .ans .ex{font-size:13px;}
    .prow{gap:8px;margin-top:12px;}
    .pb{padding:12px 14px;font-size:15px;min-height:44px;}
    #p-judge{display:flex !important;gap:8px;width:100%;}
    #p-judge .pb{flex:1 1 0;}
    .choices{gap:8px;} .choice{font-size:14.5px;padding:12px 8px 12px 26px;}
    .swiptip{display:block;}
    #tools{right:10px;bottom:10px;}
  }
</style></head>
<body>
<div class="wrap">

  <div id="linkbanner">
    <span>💾 Tip: click <b>Save</b> once to link this file — then your progress saves into it automatically.</span>
    <button onclick="saveHub()">Link &amp; save now</button>
    <button class="x" onclick="hideLinkBanner()" aria-label="Dismiss">✕</button>
  </div>

  <div class="bar">
    <div class="brand">Language Study Hub ✿</div>
    <div class="spacer"></div>
    <div class="pillrow lang" id="langseg">
      <button data-lang="ja" onclick="setLang('ja')">日本語</button>
      <button data-lang="ko" onclick="setLang('ko')">한국어</button>
    </div>
    <div class="nav" id="viewseg">
      <button data-view="home" onclick="setView('home')">Home</button>
      <button data-view="lesson" onclick="setView('lesson')">Lesson</button>
      <button data-view="practice" onclick="setView('practice')">Practice</button>
      <button data-view="browse" onclick="setView('browse')">Browse</button>
    </div>
  </div>

  <div class="subbar">
    <div class="palrow" id="palrow"></div>
    <div class="toggles">
      <label class="tog"><input type="checkbox" id="tg-romaji" onchange="setToggle('romaji',this.checked)">Romaji</label>
      <label class="tog"><input type="checkbox" id="tg-speak" onchange="setToggle('autospeak',this.checked)">Speak on flip</label>
    </div>
  </div>

  <div class="screen" id="home"></div>
  <div class="screen" id="lesson"></div>
  <div class="screen" id="practice"></div>
  <div class="screen" id="browse"></div>

  <div id="tools">
    <div id="setmenu">
      <div class="setnote">Click 💾 Save once to link this file — then progress writes straight back into it. Export/Import moves progress between devices.</div>
      <button id="saveBtn" onclick="saveHub();toggleSettings(false)">💾 Save</button>
      <button onclick="exportData();toggleSettings(false)">↑ Export progress</button>
      <button onclick="document.getElementById('impfile').click();toggleSettings(false)">↓ Import progress</button>
      <button onclick="downloadBackup();toggleSettings(false)">⤓ Download a backup copy</button>
    </div>
    <span id="saved">Auto-saved ✓</span>
    <button class="mini gear" onclick="toggleSettings()" aria-label="Settings" title="Save · export · import · backup">⚙</button>
    <input id="impfile" type="file" accept=".json,application/json" style="display:none" onchange="importData(this)">

ocus": ""}, {"id": "k80cbb89df2", "level": "Level 1", "cat": "Demonstratives", "type": "vocab", "item": "あそこ", "reading": "asoko", "meaning": "over there", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "k156c25d23f", "level": "Level 1", "cat": "Demonstratives", "type": "vocab", "item": "どこ", "reading": "doko", "meaning": "where", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "ked54a0f924", "level": "Level 1", "cat": "Grammar", "type": "grammar", "item": "AはBです", "reading": "A wa B desu", "meaning": "A is B (topic + predicate)", "example": "わたしはがくせいです。 (watashi wa gakusei desu) — I am a student.", "notes": "Basic ‘A is B’ sentence. **は** marks the topic (what you're talking about); **です** = ‘is/am/are’ and sits at the very end. Written は but read ‘wa’ here. Don't mix it up with が, which points out the subject.", "q": "How do you say “A is B” politely?", "focus": "は|です"}, {"id": "kfe42a10568", "level": "Level 1", "cat": "Grammar", "type": "grammar", "item": "〜じゃないです", "reading": "~ ja nai desu", "meaning": "is not ~ (polite negative of です)", "example": "これはペンじゃないです。 (kore wa pen ja nai desu) — This isn't a pen.", "notes": "Polite ‘is not’. Take a noun and add **じゃないです** (a bit more formal: ではありません). Only negates noun / な-adjective sentences — verbs and い-adjectives make their own negatives.", "q": "Polite negative of です (‘is not’)?", "focus": "じゃないです"}, {"id": "k86850d2465", "level": "Level 1", "cat": "Grammar", "type": "grammar", "item": "AのB", "reading": "A no B", "meaning": "A's B / B of A (possessive・linking)", "example": "これはわたしのほんです。 (kore wa watashi no hon desu) — This is my book.", "notes": "**の** links two nouns: A の B = ‘A's B’ / ‘B of A’. The owner or describer comes first (わたしのほん = my book, にほんごのせんせい = Japanese teacher). Noun + noun only — never after a verb.", "q": "Particle that links two nouns (‘my book’)?", "focus": "の"}, {"id": "k3dc351b61f", "level": "Level 1", "cat": "Grammar", "type": "grammar", "item": "〜も", "reading": "~ mo", "meaning": "also / too", "example": "わたしもいきます。 (watashi mo ikimasu) — I'll go too.", "notes": "**も** replaces は or が to mean ‘also / too’ (わたしも = me too). It swaps in for the topic/subject particle — don't stack は and も together.", "q": "Particle for ‘also / too’?", "focus": "も"}, {"id": "ka5c3f8f68a", "level": "Level 1", "cat": "Grammar", "type": "grammar", "item": "だれの", "reading": "dare no", "meaning": "whose", "example": "これはだれのかばんですか。 (kore wa dare no kaban desu ka) — Whose bag is this?", "notes": "**だれの** = ‘whose’ (だれ ‘who’ + の). Answer with 〜の too — わたしの = ‘mine’.", "q": "How do you ask ‘whose ~?’", "focus": "だれの"}, {"id": "k312e1dabcd", "level": "Level 1", "cat": "Grammar", "type": "grammar", "item": "〜ませんか", "reading": "~ masen ka", "meaning": "won't you ~? (invitation)", "example": "いっしょにたべませんか。 (issho ni tabemasen ka) — Won't you eat with me?", "notes": "Friendly invitation: verb ます-stem + **ませんか** = ‘won't you ~? / shall we ~?’. It looks like a negative question but it's an invite. Softer than 〜ましょう, which already assumes yes.", "q": "How do you invite someone (‘won't you ~?’)?", "focus": "ませんか"}, {"id": "k798f9b1118", "level": "Level 1", "cat": "Grammar", "type": "grammar", "item": "〜ね / 〜よ", "reading": "~ ne / ~ yo", "meaning": "right? (agreement) / you know (emphasis)", "example": "いいてんきですね。／これ、おいしいですよ。 (ii tenki desu ne / kore, oishii desu yo) — Nice weather, isn't it? / This is tasty, you know.", "notes": "Sentence-end particles. **ね** = ‘right? / isn't it?’ when you expect the listener to agree; **よ** = ‘you know / I'm telling you’ when giving new info. Use よ sparingly — overused it can sound pushy.", "q": "Sentence-final particles for agreement vs emphasis?", "focus": "ね|よ"}, {"id": "k4909ee8526", "level": "Level 1", "cat": "People & time", "type": "vocab", "item": "いま", "reading": "ima", "meaning": "now", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "kc2d326c63e", "level": "Level 1", "cat": "People & time", "type": "vocab", "ite s": ""}, {"id": "k34fbbcf30a", "level": "Level 2", "cat": "Existence & location", "type": "vocab", "item": "うしろ", "reading": "ushiro", "meaning": "behind", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "ke5d3240aee", "level": "Level 2", "cat": "Grammar", "type": "grammar", "item": "〜でした", "reading": "~ deshita", "meaning": "was / were (past of です)", "example": "きのうはやすみでした。 (kinou wa yasumi deshita) — Yesterday was a day off.", "notes": "Past of です: noun / な-adjective + **でした** = ‘was / were’. Negative past is じゃなかったです. Only nouns & な-adjectives — い-adjectives use 〜かったです instead.", "q": "Past polite form of です (‘was’)?", "focus": "でした"}, {"id": "k5eeae8d542", "level": "Level 2", "cat": "Grammar", "type": "grammar", "item": "〜ました", "reading": "~ mashita", "meaning": "did ~ (polite past verb)", "example": "あさ、パンを食べました。 (asa, pan o tabemashita) — I ate bread this morning.", "notes": "Polite past verb: ます-stem + **ました** = ‘did ~’ (たべます→たべました). Negative past: 〜ませんでした. For completed actions.", "q": "Polite past verb ending (‘did ~’)?", "focus": "ました"}, {"id": "kb0fe0c91ab", "level": "Level 2", "cat": "Grammar", "type": "grammar", "item": "〜じかん", "reading": "~ jikan", "meaning": "for ~ hours (duration)", "example": "さんじかん べんきょうしました。 (san-jikan benkyou shimashita) — I studied for three hours.", "notes": "**じかん** counts a length of time in hours (さんじかん = ‘for 3 hours’). Don't confuse with 〜じ (さんじ = ‘3 o'clock’, a point in time). じかん = how long, じ = what time.", "q": "How do you express a length of time in hours?", "focus": "じかん"}, {"id": "k4d36d86cfd", "level": "Level 2", "cat": "Grammar", "type": "grammar", "item": "に / で / と", "reading": "ni / de / to", "meaning": "at (time/place) / at (action) / with", "example": "ともだちと えきで あいます。 (tomodachi to eki de aimasu) — I'll meet my friend at the station.", "notes": "Three particles that often get mixed up: **に** = target or time (しちじに、がっこうに), **で** = where an action happens or the means (がっこうで、でんしゃで), **と** = ‘with (a person)’ or ‘and (nouns)’. に destination/time, で the place you DO something, と companions.", "q": "Particles for location, action-place and ‘with’?", "focus": "と|で"}, {"id": "k248a1f8a9b", "level": "Level 2", "cat": "Adjectives", "type": "vocab", "item": "きれい", "reading": "kirei", "meaning": "pretty / clean (na-adj)", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "k0ffabe9aaa", "level": "Level 2", "cat": "Adjectives", "type": "vocab", "item": "しずか", "reading": "shizuka", "meaning": "quiet (na-adj)", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "ka0ed4acdf6", "level": "Level 2", "cat": "Adjectives", "type": "vocab", "item": "ゆうめい", "reading": "yuumei", "meaning": "famous (na-adj)", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "k11f783e42d", "level": "Level 2", "cat": "Adjectives", "type": "vocab", "item": "べんり", "reading": "benri", "meaning": "convenient (na-adj)", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "kcb9acd27cc", "level": "Level 2", "cat": "Adjectives", "type": "vocab", "item": "たかい", "reading": "takai", "meaning": "tall / expensive (i-adj)", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "k5ea302b309", "level": "Level 2", "cat": "Adjectives", "type": "vocab", "item": "やすい", "reading": "yasui", "meaning": "cheap (i-adj)", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "k0246601d1b", "level": "Level 2", "cat": "Adjectives", "type": "vocab", "item": "あたらしい", "reading": "atarashii", "meaning": "new (i-adj)", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "kaf76bd8696", "level": "Level 2", "cat": "Grammar", "type": "grammar", "item": "〜かったです", "reading": "~ katta desu", "meaning": "was ~ (past of い-adjective)", "example": "えいがは おもしろかったです。 (eiga wa omoshirokatta desu) — The movie was interesting.", "notes": "Past of an い-adjective: drop the final い and add **かったです** (たかい→たかかったです = ‘was expensive’). いい is irregular → よかったです. Never add でした to an い-adjective.", "q": "Past tense of an い-adjective (‘was tall’)?", "focus": "かったです"}, {"id": "k939646cd79", "level": "Level 2", "cat": "Likes & suggesting", "type": "grammar", "item": "〜がすきです", "reading": "~ ga suki desu", "meaning": "I like ~", "example": "わたしは すしが すきです。 (watashi wa sushi ga suki desu) — I like sushi.", "notes": "Liking: thing + **が** + **すきです**. The liked thing takes が, NOT を — a classic trap. Scale: だいすき > すき > きらい > だいきらい. すき/きらい are な-adjectives, so their past is 〜でした.", "q": "How do you say ‘I like ~’?", "focus": "が|すきです"}, {"id": "k10b6638ae9", "level": "Level 2", "cat": "Likes & suggesting", "type": "vocab", "item": "だいすき", "reading": "daisuki", "meaning": "really like", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "ke2aa822acb", "level": "Level 2", "cat": "Likes & suggesting", "type": "vocab", "item": "きらい", "reading": "kirai", "meaning": "dislike", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "ke5d0f5ed58", "level": "Level 2", "cat": "Likes & suggesting", "type": "vocab", "item": "だいきらい", "reading": "daikirai", "meaning": "really dislike", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "k154c20d22c", "level": "Level 2", "cat": "Likes & suggesting", "type": "grammar", "item": "〜ましょう", "reading": "~ mashou", "meaning": "let's ~", "example": "いっしょに行きましょう。 (issho ni ikimashou) — Let's go together.", "notes": "verb-stem + **ましょう** = ‘let's ~’ (いきましょう). Assumes the other person is on board. For a gentler invite, use 〜ませんか.", "q": "How do you say ‘let's ~’?", "focus": "ましょう"}, {"id": "k0cd5344a9d", "level": "Level 2", "cat": "Likes & suggesting", "type": "grammar", "item": "〜ましょうか", "reading": "~ mashou ka", "meaning": "shall we / shall I ~?", "example": "にもつを もちましょうか。 (nimotsu o mochimashou ka) — Shall I carry your bags?", "notes": "**ましょうか** = ‘shall I? / shall we?’ — offering to help or suggesting something (もちましょうか = shall I carry it?). Use it when doing something for the other person.", "q": "How do you offer/suggest ‘shall I ~?’", "focus": "ましょうか"}, {"id": "k2b80ad7872", "level": "Level 2", "cat": "Likes & suggesting", "type": "grammar", "item": "〜まい", "reading": "~ mai", "meaning": "counter for flat objects", "example": "きっぷを 二まい ください。 (kippu o ni-mai kudasai) — Two tickets, please.", "notes": "**まい** counts thin, flat objects — paper, tickets, plates, shirts (にまい = 2 sheets). Japanese has a different counter per object type, so use まい only for flat things.", "q": "Counter for flat things (paper, tickets)?", "focus": "まい"}, {"id": "k73ad614239", "level": "Level 2", "cat": "Te-form", "type": "grammar", "item": "食べて", "reading": "tabete", "meaning": "te-form of 食べる", "example": "くだものを食べて、水を飲みます。 (kudamono o tabete, mizu o nomimasu) — I eat fruit and (then) drink water.", "notes": "The **て-form** links clauses (‘do X and…’) and is the base for many patterns (〜ています, 〜てください…). る-verbs: drop る + て. う-verbs shift sound (のむ→のんで; いく→いって is irregular).", "q": "Te-form of 食べる (taberu)?", "focus": "食べて"}, {"id": "ke1e7d71e49", "level": "Level 2", "cat": "Te-form", "type": "grammar", "item": "〜てもいいです", "reading": "~ te mo ii desu", "meaning": "you may ~ (permission)", "example": "ここで しゃしんを とってもいいですか。 (koko de shashin o totte mo ii desu ka) — May I take a photo here?", "notes": "Permission: て-form + **てもいいです** = ‘you may / it's OK to ~’. Ask 〜てもいいですか = ‘may I?’. The permission lives in the てもいい tail on the verb. Opposite: 〜てはいけません.", "q": "How do you give permission (‘you may ~’)?", "focus": "てもいいです"}, {"id": "kbd76a9b204", "level": "Level 2", "cat": "Te-form", "type": "grammar", "item": "〜てはいけません", "reading": "~ te wa ikemasen", "meaning": "you must not ~ (prohibition)", "example": "ここで たばこを すってはいけません。 (koko de tabako o sutte wa ikemasen) — You must not smoke here.", "notes": "Prohibition: て-form + **てはいけません** = ‘you must not ~’ (すってはいけません = must not smoke). The firm ‘rule’ version; casual is 〜ちゃだめ. Opposite of 〜てもいいです.", "q": "How do you state prohibition (‘must not ~’)?", "focus": "てはいけません"}, {"id": "k5de7821f69", "level": "Level 2", "cat": "Te-form", "type": "grammar", "item": "〜から", "reading": "~ kara", "meaning": "because ~ (reason)", "example": "さむいから、まどを しめます。 (samui kara, mado o shimemasu) — Because it's cold, I'll close the window.", "notes": "After a plain or です clause, **から** = ‘because ~’. The reason comes first: さむいから、まどをしめます. から attaches to the reason clause. (After a noun, から can also mean ‘from’.)", "q": "How do you give a reason (‘because ~’)?", "focus": "から"}, {"id": "ke2590aa764", "level": "Level 3", "cat": "Kanji", "type": "char", "item": "京", "reading": "kyou / kei", "meaning": "capital", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "kf1aa2b3d0d", "level": "Level 3", "cat": "Kanji", "type": "char", "item": "子", "reading": "ko / shi", "meaning": "child", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k6ef921ac52", "level": "Level 3", "cat": "Kanji", "type": "char", "item": "小", "reading": "chii(sai) / shou", "meaning": "small", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "kc2d33b8b48", "level": "Level 3", "cat": "Kanji", "type": "char", "item": "会", "reading": "kai / a(u)", "meaning": "meeting / to meet", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k88da0c80e1", "level": "Level 3", "cat": "Kanji", "type": "char", "item": "社", "reading": "sha / yashiro", "meaning": "company / shrine", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k0c355bb78a", "level": "Level 3", "cat": "Kanji", "type": "char", "item": "父", "reading": "chichi / fu", "meaning": "father", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k813b969998", "level": "Level 3", "cat": "Kanji", "type": "char", "item": "母", "reading": "haha / bo", "meaning": "mother", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "ked77ba03f3", "level": "Level 3", "cat": "Kanji", "type": "char", "item": "高", "reading": "taka(i) / kou", "meaning": , "example": "ひるごはんを食べに行きます。 (hirugohan o tabe ni ikimasu) — I'm going (out) to eat lunch.", "notes": "verb-stem + **に** + いく/くる/かえる = ‘go / come / return in order to ~’. たべにいく = go to eat — the stem (たべ) shows the purpose and に marks it. Only with motion verbs (いく・くる・かえる).", "q": "How do you say ‘go in order to ~’?", "focus": "に行きます"}, {"id": "k99e14c994e", "level": "Level 3", "cat": "Grammar", "type": "grammar", "item": "〜にん", "reading": "~ nin", "meaning": "counter for people", "example": "かぞくは 四人です。 (kazoku wa yo-nin desu) — There are four people in my family.", "notes": "**にん** counts people (さんにん = 3 people). Watch the exceptions: ひとり (1), ふたり (2). People only.", "q": "Counter for people?", "focus": "人"}, {"id": "kce69455de3", "level": "Level 3", "cat": "Grammar", "type": "grammar", "item": "〜くて / 〜で", "reading": "~ kute / ~ de", "meaning": "and (linking adjectives)", "example": "このへやは ひろくて きれいです。 (kono heya wa hirokute kirei desu) — This room is spacious and clean.", "notes": "Joining adjectives: い-adj drop い + **くて** (ひろい→ひろくて); な-adj / noun + **で** (きれい→きれいで) = ‘~ and ~’. Put them before the final adjective. いい is irregular → よくて.", "q": "How do you link two adjectives (‘tall and…’)?", "focus": "くて"}, {"id": "k19be67d2df", "level": "Level 3", "cat": "Grammar", "type": "grammar", "item": "〜とおもいます", "reading": "~ to omoimasu", "meaning": "I think that ~", "example": "あした雨がふるとおもいます。 (ashita ame ga furu to omoimasu) — I think it will rain tomorrow.", "notes": "plain form + **とおもいます** = ‘I think that ~’. The clause before と is your thought; と marks it as a quote; おもいます = think. Use the plain (dictionary / ない / た) form before と — not です/ます.", "q": "How do you say ‘I think that ~’?", "focus": "とおもいます"}, {"id": "ka5e78af4a8", "level": "Level 3", "cat": "Grammar", "type": "grammar", "item": "〜といっていました", "reading": "~ to itte imashita", "meaning": "(they) said that ~", "example": "田中さんは来るといっていました。 (Tanaka-san wa kuru to itte imashita) — Tanaka said they would come.", "notes": "plain form + **といっていました** = ‘(someone) said that ~’. Reports what another person said; と marks the quoted words, いっていました = was saying. Plain form goes before と.", "q": "How do you report ‘(someone) said that ~’?", "focus": "といっていました"}, {"id": "k12d12ce0ff", "level": "Level 3", "cat": "Grammar", "type": "grammar", "item": "〜ないでください", "reading": "~ naide kudasai", "meaning": "please don't ~", "example": "ここに入らないでください。 (koko ni hairanaide kudasai) — Please don't come in here.", "notes": "verb ない-form + **ないでください** = ‘please don't ~’ (はいらないでください). A polite negative request. The positive version is 〜てください.", "q": "How do you ask someone NOT to do something?", "focus": "ないでください"}, {"id": "k264a8ec366", "level": "Level 3", "cat": "Grammar", "type": "grammar", "item": "〜のがすきです", "reading": "~ no ga suki desu", "meaning": "like doing ~", "example": "本を読むのがすきです。 (hon o yomu no ga suki desu) — I like reading books.", "notes": "verb (plain) + **のがすきです** = ‘like doing ~’. の turns the verb into a noun (‘the act of ~’), then がすきです. よむのがすきです = like reading. Plain form + の before が.", "q": "How do you say ‘I like doing ~’?", "focus": "のがすきです"}, {"id": "ke5b45a28e9", "level": "Level 3", "cat": "Grammar", "type": "grammar", "item": "が", "reading": "ga", "meaning": "subject marker", "example": "だれが 来ますか。 (dare ga kimasu ka) — Who is coming?", "notes": "**が** marks the subject — who/what does the action, usually new or in focus. だれがきますか = ‘who is coming?’. Use が (not は) with question words like だれ/なに and to introduce new information; は is for the already-known topic.", "q": "Particle that marks the subject (who does it)?", "focus": "が"}, {"id": "k6b42dd856a", "level": "Level 3", "cat": "Grammar", "type": "grammar", "item": "まだ〜ていません", "reading": "mada ~ te imasen", "meaning": "haven't ~ yet", "example": "まだ ひるごはんを食べていません。 (mada hirugohan o tabete imasen) — I haven't eaten lunch yet.", "notes": "**まだ** + て-form + **ていません** = ‘haven't ~ yet’ (まだたべていません). Don't use the plain past negative (たべなかった = ‘didn't eat’) for ‘not yet’ — まだ〜ていません implies it may still happen.", "q": "How do you say ‘haven't ~ yet’?", "focus": "まだ|ていません"}, {"id": "kbd5fdf48ae", "level": "Level 3", "cat": "Grammar", "type": "grammar", "item": "〜つ", "reading": "~ tsu", "meaning": "native counter for things", "example": "りんごを 三つ ください。 (ringo o mittsu kudasai) — Three apples, please.", "notes": "**つ** is the native all-purpose counter for objects: ひとつ, ふたつ, みっつ… up to とお (10). Use it when no specific counter fits, and for small children's ages.", "q": "Native counter for general objects?", "focus": "三つ"}, {"id": "kc9ea796805", "level": "Level 3", "cat": "Ordering", "type": "vocab", "item": "〜をください", "reading": "~ o kudasai", "meaning": "please give me ~", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "k4b85c9793a", "level": "Level 3", "cat": "Ordering", "type": "vocab", "item": "〜をおねがいします", "reading": "~ o onegai shimasu", "meaning": "I'd like ~ please", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "k209827a191", "level": "Level 3", "cat": "Ordering", "type": "vocab", "item": "メニュー", "reading": "menyuu", "meaning": "menu", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "k38473926ad", "level": "Level 3", "cat": "Ordering", "type": "vocab", "item": "ちゅうもん", "reading": "chuumon", "meaning": "order", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "ke01aad72e8", "level": "Level 4", "cat": "Kanji", "type": "char", "item": "物", "reading": "mono / butsu", "meaning": "thing", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k93eca30ca0", "level": "Level 4", "cat": "Kanji", "type": "char", "item": "鳥", "reading": "tori", "meaning": "bird", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k27aa642755", "level": "Level 4", "cat": "Kanji", "type": "char", "item": "料", "reading": "ryou", "meaning": "fee / ingredients", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k557388 focus": ""}, {"id": "kd50cd43d9d", "level": "Level 4", "cat": "Kanji", "type": "char", "item": "始", "reading": "haji(meru) / shi", "meaning": "to begin", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k5287a2093c", "level": "Level 4", "cat": "Kanji", "type": "char", "item": "週", "reading": "shuu", "meaning": "week", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k5cdec9bf78", "level": "Level 4", "cat": "Kanji", "type": "char", "item": "似", "reading": "ni(ru) / ji", "meaning": "to resemble", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "kd83f4b28f3", "level": "Level 4", "cat": "Kanji", "type": "char", "item": "孝", "reading": "kou", "meaning": "filial piety", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k991521facd", "level": "Level 4", "cat": "Kanji", "type": "char", "item": "開", "reading": "a(keru) / kai", "meaning": "to open", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k7c373429f1", "level": "Level 4", "cat": "Kanji", "type": "char", "item": "屋", "reading": "ya / oku", "meaning": "shop / roof", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "kb18b38fedf", "level": "Level 4", "cat": "Kanji", "type": "char", "item": "方", "reading": "kata / hou", "meaning": "way / direction / person", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k0191f14bd8", "level": "Level 4", "cat": "Kanji", "type": "char", "item": "運", "reading": "hako(bu) / un", "meaning": "to carry / luck", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "kee31391278", "level": "Level 4", "cat": "Kanji", "type": "char", "item": "動", "reading": "ugo(ku) / dou", "meaning": "to move", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "ke6f515397a", "level": "Level 4", "cat": "Kanji", "type": "char", "item": "教", "reading": "oshi(eru) / kyou", "meaning": "to teach", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k5a01764859", "level": "Level 4", "cat": "Kanji", "type": "char", "item": "室", "reading": "shitsu / muro", "meaning": "room", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k809f0aa618", "level": "Level 4", "cat": "Grammar", "type": "grammar", "item": "potential form (〜られる/〜える)", "reading": "~ rareru / ~ eru", "meaning": "can do / be able to", "example": "すしが食べられます。 (sushi ga taberaremasu) — I can eat sushi.", "notes": "Potential form = ‘able to’. る-verbs: drop る + **られる** (食べる→食べられる); う-verbs: change the final sound to the え-row + る (のむ→のめる); する→**できる**, くる→こられる. The object often takes が, not を.", "q": "", "focus": "食べられます"}, {"id": "k3691bc7dae", "level": "Level 4", "cat": "Grammar", "type": "grammar", "item": "ほしい", "reading": "hoshii", "meaning": "to want (a thing)", "example": "新しいくつがほしいです。 (atarashii kutsu ga hoshii desu) — I want new shoes.", "notes": "**ほしい** = ‘want’ for a THING (not an action). It's an い-adjective: thing + が + ほしい. For wanting to DO something, use verb-stem + たい instead.", "q": "", "focus": "ほしい"}, {"id": "k565858bdfe", "level": "Level 4", "cat": "Grammar", "type": "grammar", "item": "〜し", "reading": "~ shi", "meaning": "and (listing reasons)", "example": "やすいし、おいしいし、いいですね。 (yasui shi, oishii shi, ii desu ne) — It's cheap, it's tasty… nice, isn't it?", "notes": "**〜し** stacks up reasons/qualities: ‘it's A, and B, and…’. Attach to plain forms. Implies these are just some of the reasons.", "q": "", "focus": "し"}, {"id": "k7a04f88272", "level": "Level 4", "cat": "Grammar", "type": "grammar", "item": "〜そうです (looks like)", "reading": "~ sou desu", "meaning": "looks like / seems (appearance)", "example": "このケーキ、おいしそうです。 (kono keeki, oishisou desu) — This cake looks delicious.", "notes": "Appearance-based guess from what you SEE. Verb ます-stem or adjective stem + **そうです** (おいしい→おいしそう). Different from the hearsay 〜そうです (which uses the plain form).", "q": "", "focus": "そうです"}, {"id": "kc9cac0a445", "level": "Level 4", "cat": "Grammar", "type": "grammar", "item": "〜てみる", "reading": "~ te miru", "meaning": "to try doing", "example": "この服を着てみます。 (kono fuku o kite mimasu) — I'll try wearing these clothes.", "notes": "て-form + **みる** = ‘do and see / give it a try’. 食べてみる = try eating (to see how it is).", "q": "", "focus": "てみます"}, {"id": "k2ceb2035a6", "level": "Level 4", "cat": "Grammar", "type": "grammar", "item": "なら", "reading": "nara", "meaning": "if / as for", "example": "日本なら、京都がいいですよ。 (nihon nara, kyouto ga ii desu yo) — If it's Japan (you mean), Kyoto is good.", "notes": "**なら** = ‘if it's the case that / as for ~’. Picks up a topic someone raised and gives advice about it.", "q": "", "focus": "なら"}, {"id": "k7fd8698080", "level": "Level 4", "cat": "Grammar", "type": "grammar", "item": "〜かもしれません", "reading": "~ kamoshiremasen", "meaning": "might / maybe", "example": "あした雨がふるかもしれません。 (ashita ame ga furu kamoshiremasen) — It might rain tomorrow.", "notes": "Plain form + **かもしれません** = ‘might / perhaps’. Less certain than 〜でしょう. Casual: 〜かも.", "q": "", "focus": "かもしれません"}, {"id": "k679c1937ff", "level": "Level 4", "cat": "Grammar", "type": "grammar", "item": "あげる・くれる・もらう", "reading": "ageru / kureru / morau", "meaning": "give / give (to me) / receive", "example": "友だちにプレゼントをあげました。 (tomodachi ni purezento o agemashita) — I gave my friend a present.", "notes": "Giving & receiving. **あげる** = I/someone gives (outward); **くれる** = someone gives to ME (inward); **もらう** = I receive. Direction is everything — くれる always points toward you/your side.", "q": "", "focus": "あげました"}, {"id": "k769ee3b3b5", "level": "Level 4", "cat": "Grammar", "type": "grammar", "item": "〜たらどうですか", "reading": "~ tara dou desu ka", "meaning": "why don't you ~? (suggestion)", "example": "もう帰ったらどうですか。 (mou kaettara dou desu ka) — Why don't you head home now?", "notes": "た-form + **らどうですか** = a soft suggestion, ‘why don't you ~? / how about ~ing?’.", "q": "", "focus": "たらどうですか"}, {"id": "kc7708ad7ec", "level": "Level 4", "cat": "Grammar", "type": "grammar", "item": "number + も / しか", "reading": "~ mo / ~ shika", "meaning": "as many as / only (+ negative)", "example": "三人も来ました。／千円しかありません。 (san-nin mo kimashita / sen-en shika arimasen) — As many as 3 people came. / I only have 1000 yen.", "notes": "Number + **も** = ‘as many as’ (surprisingly a lot). Number + **しか** + negative = ‘only’ (disappointingly few). しか always needs a negative verb.", "q": "", "focus": "も|しか"}, {"id": "k850e921e31", "level": "Level 4", "cat": "Grammar", "type": "grammar", "item": "volitional form (〜よう/〜おう)", "reading": "~ you / ~ ou", "meaning": "let's / I'll (casual)", "example": "いっしょに行こう。 (issho ni ikou) — Let's go together.", "notes": "Casual ‘let's / I think I'll’. る-verbs: drop る + **よう** (食べる→食べよう); う-verbs: final sound to the お-row + う (いく→いこう); する→しよう, くる→こよう. The plain-speech version of 〜ましょう.", "q": "", "focus": "行こう"}, {"id": "ke25a631936", "level": "Level 4", "cat": "Grammar", "type": "grammar", "item": "〜と思っています", "reading": "~ to omotte imasu", "meaning": "intend to / am thinking of", "example": "留学しようと思っています。 (ryuugaku shiyou to omotte imasu) — I'm thinking of studying abroad.", "notes": "volitional + **と思っています** = an ongoing intention (‘I'm thinking of ~ing’). Stronger/steadier than a one-off と思います.", "q": "", "focus": "と思っています"}, {"id": "k6b04b9e407", "level": "Level 4", "cat": "Grammar", "type": "grammar", "item": "〜ておく", "reading": "~ te oku", "meaning": "do in advance", "example": "レストランを予約しておきます。 (resutoran o yoyaku shite okimasu) — I'll book the restaurant in advance.", "notes": "て-form + **おく** = do something ahead of time / leave it ready. Casual contraction: 〜とく.", "q": "", "focus": "ておきます"}, {"id": "k20a525ea45", "level": "Level 4", "cat": "Grammar", "type": "grammar", "item": "〜ていただけませんか", "reading": "~ te itadakemasen ka", "meaning": "could you please ~? (very polite)", "example": "手伝っていただけませんか。 (tetsudatte itadakemasen ka) — Could you please help me?", "notes": "て-form + **いただけませんか** = a very polite request. More humble/formal than 〜てください or 〜てくれませんか.", "q": "", "focus": "ていただけませんか"}, {"id": "k6e5a06dbdf", "level": "Level 4", "cat": "Grammar", "type": "grammar", "item": "relative clause (noun modifier)", "reading": "~ (clause) + N", "meaning": "a clause describing a noun", "example": "わたしが作った料理です。 (watashi ga tsukutta ryouri desu) — It's the food that I made.", "notes": "In Japanese the describing clause comes BEFORE the noun, using plain forms: [わたしが読んだ]本 = ‘the book [that I read]’. No ‘which/that’ word — word order does the job.", "q": "", "focus": "作った料理"}, {"id": "k8e27d2840f", "level": "Level 4", "cat": "Grammar", "type": "grammar", "item": "〜時 (とき)", "reading": "~ toki", "meaning": "when ~", "example": "子どものとき、よく海に行きました。 (kodomo no toki, yoku umi ni ikimashita) — When I was a child, I often went to the sea.", "notes": "plain form + **とき** = ‘when ~’. Present before とき = ‘when doing’; past (た) before とき = ‘after having done’.", "q": "", "focus": "とき"}, {"id": "kfa9090da6f", "level": "Level 5", "cat": "Kanji", "type": "char", "item": "歳", "reading": "sai", "meaning": "years old", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "ka14ccbe7d2", "level": "Level 5", "cat": "Kanji", "type": "char", "item": "習", "reading": "nara(u) / shuu", "meaning": "to learn", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "keeefe986d2", "level": "Level 5", "cat": "Kanji", "type": "char", "item": "主", "reading": "shu / nushi", "meaning": "main / master", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k6ca7775324", "level": "Level 5", "cat": "Kanji", "type": "char", "item": "結", "reading": "musu(bu) / ketsu", "meaning": "to tie / bind", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k384ec7cfb0", "level": "Level 5", "cat": "Kanji", "type": "char", "item": "婚", "reading": "kon", "meaning": "marriage", "example": "", "notes": "course ka t": "Kanji", "type": "char", "item": "心", "reading": "kokoro / shin", "meaning": "heart / mind", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k92cf6b4efc", "level": "Level 5", "cat": "Kanji", "type": "char", "item": "笑", "reading": "wara(u) / shou", "meaning": "to laugh", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k902f146222", "level": "Level 5", "cat": "Kanji", "type": "char", "item": "絶", "reading": "zetsu / ta(eru)", "meaning": "to sever / absolute", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "kd6985fe3be", "level": "Level 5", "cat": "Kanji", "type": "char", "item": "対", "reading": "tai / tsui", "meaning": "versus / pair", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k955f5ff788", "level": "Level 5", "cat": "Kanji", "type": "char", "item": "痛", "reading": "ita(i) / tsuu", "meaning": "painful", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k873fa746d7", "level": "Level 5", "cat": "Kanji", "type": "char", "item": "最", "reading": "motto(mo) / sai", "meaning": "most", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k9c96a54677", "level": "Level 5", "cat": "Kanji", "type": "char", "item": "続", "reading": "tsuzu(ku) / zoku", "meaning": "to continue", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k12aa21ecd7", "level": "Level 5", "cat": "Grammar", "type": "grammar", "item": "〜そうです (I hear)", "reading": "~ sou desu", "meaning": "I hear that ~ (hearsay)", "example": "あしたは雨だそうです。 (ashita wa ame da sou desu) — I hear it'll rain tomorrow.", "notes": "Plain form + **そうです** = ‘I hear / they say that ~’. Reports info you got from somewhere. Note it attaches to the PLAIN form (雨だそうです), unlike the ‘looks like’ そう which uses the stem.", "q": "", "focus": "そうです"}, {"id": "k6911cdbc9b", "level": "Level 5", "cat": "Grammar", "type": "grammar", "item": "〜って", "reading": "~ tte", "meaning": "casual ‘they say / I heard’", "example": "田中さん、来ないって。 (Tanaka-san, konai tte) — Tanaka says he's not coming.", "notes": "**って** is the casual spoken version of と / という / そうです — quoting or reporting. 田中さん、来ないって = ‘Tanaka says he's not coming’.", "q": "", "focus": "って"}, {"id": "ka69519bb14", "level": "Level 5", "cat": "Grammar", "type": "grammar", "item": "〜たら", "reading": "~ tara", "meaning": "if / when ~", "example": "時間があったら、行きます。 (jikan ga attara, ikimasu) — If I have time, I'll go.", "notes": "た-form + **ら** = the all-purpose conditional ‘if/when ~ (then)’. Very common in speech. First thing happens, then the second.", "q": "", "focus": "たら"}, {"id": "k6735639fde", "level": "Level 5", "cat": "Grammar", "type": "grammar", "item": "〜なくてもいいです", "reading": "~ nakute mo ii desu", "meaning": "don't have to ~", "example": "あした来なくてもいいです。 (ashita konakute mo ii desu) — You don't have to come tomorrow.", "notes": "ない-form → なくて + **もいいです** = ‘you don't have to ~’. The negative counterpart of 〜てもいいです (may).", "q": "", "focus": "なくてもいいです"}, {"id": "ka1c2dc50ec", "level": "Level 5", "cat": "Grammar", "type": "grammar", "item": "〜みたいです", "reading": "~ mitai desu", "meaning": "seems like / looks like", "example": "彼はいそがしいみたいです。 (kare wa isogashii mitai desu) — He seems busy.", "notes": "Plain form / noun + **みたいです** = ‘seems, looks like’ (casual, based on impression). Similar to ようです but more colloquial.", "q": "", "focus": "みたいです"}, {"id": "ke554984927", "level": "Level 5", "cat": "Grammar", "type": "grammar", "item": "〜前に / 〜てから", "reading": "~ mae ni / ~ te kara", "meaning": "before ~ / after ~", "example": "ねる前に歯をみがきます。／食べてから行きます。 (neru mae ni ha o migakimasu / tabete kara ikimasu) — I brush my teeth before bed. / I'll go after eating.", "notes": "Dictionary form + **前に** = ‘before ~ing’; て-form + **から** = ‘after ~ing’. Order words: one action relative to another.", "q": "", "focus": "前に|てから"}, {"id": "k8835b56cb5", "level": "Level 5", "cat": "Grammar", "type": "grammar", "item": "transitivity pairs", "reading": "transitive / intransitive", "meaning": "paired verbs (open it / it opens)", "example": "ドアをあけます（他）／ドアがあきます（自）。 (doa o akemasu / doa ga akimasu) — I open the door. / The door opens.", "notes": "Many verbs come in pairs: a **transitive** one (someone does it, takes を) and an **intransitive** one (it happens by itself, takes が). あける/あく, つける/つく, はじめる/はじまる.", "q": "", "focus": "あけます|あきます"}, {"id": "kedc0327c7a", "level": "Level 5", "cat": "Grammar", "type": "grammar", "item": "〜てしまう", "reading": "~ te shimau", "meaning": "do completely / regrettably", "example": "しゅくだいをわすれてしまいました。 (shukudai o wasurete shimaimashita) — I (carelessly) forgot my homework.", "notes": "て-form + **しまう** = finish doing, OR do something regrettable/by accident. Casual: 〜ちゃう.", "q": "", "focus": "てしまいました"}, {"id": "k9ff6694f82", "level": "Level 5", "cat": "Grammar", "type": "grammar", "item": "〜と (natural result)", "reading": "~ to", "meaning": "whenever / if (automatic result)", "example": "はるになると、さくらがさきます。 (haru ni naru to, sakura ga sakimasu) — When spring comes, the cherry blossoms bloom.", "notes": "Dictionary form + **と** = ‘whenever A, B automatically follows’. For natural, always-true results (buttons, directions, nature).", "q": "", "focus": "と"}, {"id": "kd5dac3d625", "level": "Level 5", "cat": "Grammar", "type": "grammar", "item": "〜ながら", "reading": "~ nagara", "meaning": "while doing (two actions at once)", "example": "音楽をききながら、べんきょうします。 (ongaku o kikinagara, benkyou shimasu) — I study while listening to music.", "notes": "verb ます-stem + **ながら** = doing two things simultaneously by ONE person. The main action is the second clause.", "q": "", "focus": "ながら"}, {"id": "k3bd8f25732", "level": "Level 5", "cat": "Grammar", "type": "grammar", "item": "〜ばよかったです", "reading": "~ ba yokatta desu", "meaning": "should have ~ (regret)", "example": "もっとべんきょうすればよかったです。 (motto benkyou sureba yokatta desu) — I should have studied more.", "notes": "ば-conditional + **よかったです** = ‘I should have ~’ (regret you didn't). Negative: 〜なければよかった.", "q": "", "focus": "ばよかったです"}, {"id": "kcaf9254ab2", "level": "Level 5", "cat": "Grammar", "type": "grammar", "item": "honorific verbs", "reading": "sonkeigo", "meaning": "respectful verbs (for others)", "example": "先生がいらっしゃいます。 (sensei ga irasshaimasu) — The teacher is (coming / here). [respectful]", "notes": "**Honorific (尊敬語)** raises the listener/third person. Special verbs: いらっしゃる (=いる/くる/いく), めしあがる (=たべる/のむ), なさる (=する), ごらんになる (=みる).", "q": "", "focus": "いらっしゃいます"}, {"id": "k0541047d7d", "level": "Level 5", "cat": "Grammar", "type": "grammar", "item": "humble verbs", "reading": "kenjougo", "meaning": "humble verbs (for yourself)", "example": "田中ともうします。 (Tanaka to moushimasu) — My name is Tanaka. [humble]", "notes": "**Humble (謙譲語)** lowers yourself to show respect. Special verbs: まいる (=いく/くる), いたす (=する), もうす (=いう), いただく (=たべる/もらう).", "q": "", "focus": "もうします"}, {"id": "kd255013f98", "level": "Level 5", "cat": "Grammar", "type": "grammar", "item": "〜てくれてありがとう", "reading": "~ te kurete arigatou", "meaning": "thanks for ~ing", "example": "手伝ってくれてありがとう。 (tetsudatte kurete arigatou) — Thanks for helping me.", "notes": "て-form + **くれてありがとう** = ‘thank you for ~ing (for me)’. Uses くれる because the favour came toward you.", "q": "", "focus": "てくれてありがとう"}, {"id": "kb2a884d937", "level": "Level 5", "cat": "Grammar", "type": "grammar", "item": "〜てよかったです", "reading": "~ te yokatta desu", "meaning": "I'm glad that ~", "example": "日本に来てよかったです。 (nihon ni kite yokatta desu) — I'm glad I came to Japan.", "notes": "て-form + **よかったです** = ‘I'm glad I ~ed / that ~ happened’.", "q": "", "focus": "てよかったです"}, {"id": "k2be79b3194", "level": "Level 5", "cat": "Grammar", "type": "grammar", "item": "〜はずです", "reading": "~ hazu desu", "meaning": "should be / supposed to", "example": "彼は来るはずです。 (kare wa kuru hazu desu) — He should be coming.", "notes": "Plain form + **はずです** = ‘it should be (logically expected)’. Based on reasoning, not a rule. 〜はずがない = ‘couldn't possibly’.", "q": "", "focus": "はずです"}, {"id": "k7b0b05dbb7", "level": "Level 5", "cat": "Grammar", "type": "grammar", "item": "〜やすい / 〜にくい", "reading": "~ yasui / ~ nikui", "meaning": "easy to / hard to ~", "example": "このペンはかきやすいです。 (kono pen wa kakiyasui desu) — This pen is easy to write with.", "notes": "verb ます-stem + **やすい** (easy to) / **にくい** (hard to). They behave like い-adjectives.", "q": "", "focus": "やすい"}, {"id": "k57e7cd0f9d", "level": "Level 5", "cat": "Grammar", "type": "grammar", "item": "〜という", "reading": "~ to iu", "meaning": "called / named ~", "example": "これはなんというりょうりですか。 (kore wa nan to iu ryouri desu ka) — What is this dish called?", "notes": "Name + **という** + noun = ‘a ~ called (name)’. Introduces or asks about something's name.", "q": "", "focus": "という"}, {"id": "ke1b5b196c1", "level": "Level 6", "cat": "Kanji", "type": "char", "item": "信", "reading": "shin", "meaning": "trust / believe", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k609db083e3", "level": "Level 6", "cat": "Kanji", "type": "char", "item": "経", "reading": "kei / he(ru)", "meaning": "to pass through / manage", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k52e39e97d6", "level": "Level 6", "cat": "Kanji", "type": "char", "item": "台", "reading": "dai / tai", "meaning": "stand / platform", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k4257b25428", "level": "Level 6", "cat": "Kanji", "type": "char", "item": "風", "reading": "kaze / fuu", "meaning": "wind", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k74561d138d", "level": "Level 6", "cat": "Kanji", "type": "char", "item": "犬", "reading": "inu / ken", "meaning": "dog", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k815cd51b35", "level": "Level 6", "cat": "Kanji", "type": "char", "item": "重", "reading": "omo(i) / juu", "meaning": "heavy", "example": "", "notes": "course kanji"  "item": "答", "reading": "kota(eru) / tou", "meaning": "to answer", "example": "", "notes": "course kanji", "q": "", "focus": ""}, {"id": "k1e342fcd59", "level": "Level 6", "cat": "Grammar", "type": "grammar", "item": "passive (〜(ら)れる)", "reading": "~ (ra)reru", "meaning": "be done to (passive)", "example": "母にしかられました。 (haha ni shikararemashita) — I was scolded by my mother.", "notes": "**Passive**: the receiver becomes the topic. る-verbs: drop る + られる; う-verbs: あ-row + れる (よむ→よまれる). Often ‘suffered’ passive: あめにふられた = ‘I got rained on’. The doer takes に.", "q": "", "focus": "しかられました"}, {"id": "kb66f7e3387", "level": "Level 6", "cat": "Grammar", "type": "grammar", "item": "〜てある", "reading": "~ te aru", "meaning": "has been done (prepared state)", "example": "かべに絵がかけてあります。 (kabe ni e ga kakete arimasu) — A picture has been hung on the wall.", "notes": "transitive て-form + **ある** = something was done on purpose and the result remains. まどがあけてある = ‘the window has been (left) open’. Compare 〜ている (just a state).", "q": "", "focus": "てあります"}, {"id": "ka7a0077a0c", "level": "Level 6", "cat": "Grammar", "type": "grammar", "item": "〜間に", "reading": "~ aida ni", "meaning": "while / during", "example": "るすの間に、どろぼうが入りました。 (rusu no aida ni, dorobou ga hairimashita) — While I was out, a burglar broke in.", "notes": "**間に** = ‘during the time that ~ (and something happens within it)’. The に stresses that an event occurs inside that window.", "q": "", "focus": "間に"}, {"id": "kf967901b10", "level": "Level 6", "cat": "Grammar", "type": "grammar", "item": "adjective + する", "reading": "~ ku / ~ ni suru", "meaning": "make it ~ (cause a change)", "example": "へやをきれいにします。 (heya o kirei ni shimasu) — I'll make the room clean / tidy up.", "notes": "**する** with an adjective = ‘make it ~’. い-adj → く + する (大きくする); な-adj/noun → に + する (きれいにする).", "q": "", "focus": "きれいにします"}, {"id": "k539144bdb5", "level": "Level 6", "cat": "Grammar", "type": "grammar", "item": "人に〜てほしい", "reading": "~ te hoshii", "meaning": "want someone to ~", "example": "手伝ってほしいです。 (tetsudatte hoshii desu) — I want you to help me.", "notes": "person + に + て-form + **ほしい** = ‘want someone (else) to do ~’. For your own wish to do, use 〜たい instead.", "q": "", "focus": "てほしい"}, {"id": "k1b639be206", "level": "Level 6", "cat": "Grammar", "type": "grammar", "item": "causative (〜(さ)せる)", "reading": "~ (sa)seru", "meaning": "make / let someone do", "example": "子どもにやさいを食べさせます。 (kodomo ni yasai o tabesasemasu) — I make my child eat vegetables.", "notes": "**Causative**: る-verbs drop る + させる; う-verbs あ-row + せる (のむ→のませる). = make or let someone do. Let = with を or に; force = に.", "q": "", "focus": "食べさせます"}, {"id": "k5f1e770552", "level": "Level 6", "cat": "Grammar", "type": "grammar", "item": "〜なさい", "reading": "~ nasai", "meaning": "do ~ (gentle command)", "example": "はやくねなさい。 (hayaku nenasai) — Go to sleep now.", "notes": "verb ます-stem + **なさい** = a firm but caring command (parent → child, teacher → student). Softer than the plain imperative.", "q": "", "focus": "なさい"}, {"id": "k0f7d04b511", "level": "Level 6", "cat": "Grammar", "type": "grammar", "item": "〜ば", "reading": "~ ba", "meaning": "if ~ (conditional)", "example": "やすければ買います。 (yasukereba kaimasu) — If it's cheap, I'll buy it.", "notes": "The **ば** conditional: え-row + ば (やすい→やすければ; いく→いけば). Emphasises a general ‘if A then B’, often for hypothetical or advice.", "q": "", "focus": "ば"}, {"id": "k9c7b8f7fc7", "level": "Level 6", "cat": "Grammar", "type": "grammar", "item": "〜のに", "reading": "~ noni", "meaning": "even though / despite", "example": "べんきょうしたのに、わすれました。 (benkyou shita noni, wasuremashita) — Even though I studied, I forgot.", "notes": "Plain form + **のに** = ‘even though ~ (unexpectedly)’. Carries a sense of surprise or complaint that the result went against expectation.", "q": "", "focus": "のに"}, {"id": "k99f24f8f68", "level": "Level 6", "cat": "Grammar", "type": "grammar", "item": "〜のような / のように", "reading": "~ no you na / ni", "meaning": "like ~ (resembling)", "example": "ゆめのようなはなしです。 (yume no you na hanashi desu) — It's a dream-like story.", "notes": "Noun + **のような** + noun (‘a ~-like N’) / Noun + **のように** + verb (‘~ like’). Draws a comparison.", "q": "", "focus": "のような"}, {"id": "k5416af213c", "level": "Level 6", "cat": "Grammar", "type": "grammar", "item": "causative-passive (〜(さ)せられる)", "reading": "~ (sa)serareru", "meaning": "be made to do", "example": "やさいを食べさせられました。 (yasai o tabesaseraremashita) — I was made to eat vegetables.", "notes": "Causative + passive = ‘was made to (unwillingly) do’. 食べる→食べさせられる. The subject is forced by someone (に).", "q": "", "focus": "させられました"}, {"id": "k0072d64746", "level": "Level 6", "cat": "Grammar", "type": "grammar", "item": "〜ても", "reading": "~ te mo", "meaning": "even if ~", "example": "あめがふっても、行きます。 (ame ga futte mo, ikimasu) — Even if it rains, I'll go.", "notes": "て-form + **も** = ‘even if ~’. Concedes a condition: the result holds regardless.", "q": "", "focus": "ても"}, {"id": "k0eb3958c16", "level": "Level 6", "cat": "Grammar", "type": "grammar", "item": "〜ことにする", "reading": "~ koto ni suru", "meaning": "decide to ~", "example": "まいにち走ることにしました。 (mainichi hashiru koto ni shimashita) — I've decided to run every day.", "notes": "Dictionary/ない form + **ことにする** = ‘decide to (of your own will)’. Compare 〜ことになる = ‘it's been decided (by circumstances)’.", "q": "", "focus": "ことにしました"}, {"id": "k245d3919a3", "level": "Level 6", "cat": "Grammar", "type": "grammar", "item": "〜まで", "reading": "~ made", "meaning": "until ~", "example": "三時までべんきょうします。 (san-ji made benkyou shimasu) — I'll study until 3 o'clock.", "notes": "**まで** = ‘until / up to’ a time or point. 〜までに = ‘by (a deadline)’ — don't confuse the two.", "q": "", "focus": "まで"}, {"id": "k3608ade811", "level": "Level 6", "cat": "Grammar", "type": "grammar", "item": "〜方 (かた)", "reading": "~ kata", "meaning": "way of doing ~", "example": "つかい方をおしえてください。 (tsukaikata o oshiete kudasai) — Please teach me お帰りになりました"}, {"id": "ke91dabdae4", "level": "Level 7", "cat": "Grammar", "type": "grammar", "item": "humble: お〜します / いたします", "reading": "o ~ shimasu / itashimasu", "meaning": "humble verb form", "example": "おにもつをお持ちします。 (o-nimotsu o o-mochi shimasu) — I'll carry your bags. [humble]", "notes": "Lower yourself when doing something for a superior: **お** + ます-stem + **します** (more humble: いたします). 持つ→お持ちします = ‘I'll (humbly) carry it’.", "q": "", "focus": "お持ちします"}, {"id": "k1092c29075", "level": "Level 7", "cat": "Grammar", "type": "grammar", "item": "Vはじめる", "reading": "~ hajimeru", "meaning": "start ~ing", "example": "本を読みはじめました。 (hon o yomihajimemashita) — I started reading the book.", "notes": "verb ます-stem + **はじめる** = ‘begin to ~’. Paired forms: 〜だす (suddenly start), 〜つづける (keep ~ing), 〜おわる (finish ~ing).", "q": "", "focus": "はじめました"}, {"id": "k9217cc6c7f", "level": "Level 7", "cat": "Grammar", "type": "grammar", "item": "〜でしょうか", "reading": "~ deshou ka", "meaning": "I wonder / polite question", "example": "こちらでよろしいでしょうか。 (kochira de yoroshii deshou ka) — Would this be alright?", "notes": "**でしょうか** softens a question, making it more polite or tentative than 〜ですか.", "q": "", "focus": "でしょうか"}, {"id": "k9f265db456", "level": "Level 7", "cat": "Grammar", "type": "grammar", "item": "Vたあと", "reading": "~ ta ato", "meaning": "after ~ing", "example": "仕事が終わったあと、食事に行きます。 (shigoto ga owatta ato, shokuji ni ikimasu) — After work finishes, I'll go for a meal.", "notes": "た-form + **あと(で)** = ‘after ~ing’. Emphasises sequence: first this, then that.", "q": "", "focus": "たあと"}, {"id": "k9ee7703214", "level": "Level 7", "cat": "Grammar", "type": "grammar", "item": "Vてくる", "reading": "~ te kuru", "meaning": "go and come back / come to", "example": "ちょっとたばこを買ってきます。 (chotto tabako o katte kimasu) — I'll just go and buy cigarettes (and come back).", "notes": "て-form + **くる** = do something and return, or a change moving toward now (だんだん暑くなってきた). Mirror of 〜ていく (moving away/into the nce)", "example": "だれかいるようだ。 (dareka iru you da) — It seems someone is here.", "notes": "Plain form + **ようだ** = ‘it seems/appears’ based on your own observation. More formal than みたい.", "q": "", "focus": "ようだ"}, {"id": "k4d141be1fa", "level": "Level 8", "cat": "Grammar", "type": "grammar", "item": "〜ばかり", "reading": "~ bakari", "meaning": "only / nothing but", "example": "彼はゲームばかりしています。 (kare wa geemu bakari shite imasu) — He does nothing but play games.", "notes": "Noun + **ばかり** = ‘only / nothing but’; Vて + ばかり = ‘always ~ing’. Implies too much of one thing.", "q": "", "focus": "ばかり"}, {"id": "k21edc0c0ea", "level": "Level 8", "cat": "Grammar", "type": "grammar", "item": "Vたがる", "reading": "~ tagaru", "meaning": "(someone) shows they want to ~", "example": "子どもが外で遊びたがっています。 (kodomo ga soto de asobitagatte imasu) — The child wants to play outside.", "notes": "ます-stem + **たがる** = a THIRD person shows signs of wanting to do something (you can't read minds, so ~たい becomes ~たがる for others).", "q": "", "focus": "たがって"}, {"id": "kc1e6843dba", "level": "Level 8", "cat": "Grammar", "type": "grammar", "item": "お/ご〜ください", "reading": "o / go ~ kudasai", "meaning": "please ~ (honorific request)", "example": "こちらにおかけください。 (kochira ni o-kake kudasai) — Please have a seat here.", "notes": "**お** + ます-stem + **ください** (or ご + noun + ください) = a respectful ‘please ~’. Politer than 〜てください.", "q": "", "focus": "おかけください"}, {"id": "kd1485dfeaf", "level": "Level 8", "cat": "Grammar", "type": "grammar", "item": "Vつもりだ", "reading": "~ tsumori da", "meaning": "intend to ~", "example": "来年、日本に行くつもりです。 (rainen, nihon ni iku tsumori desu) — I intend to go to Japan next year.", "notes": "Dictionary form + **つもりだ** = a firm intention/plan. Negative: 〜ないつもり (intend not to).", "q": "", "focus": "つもりです"}, {"id": "k3a735b2218", "level": "Level 8", "cat": "Grammar", "type": "grammar", "item": "Vずに", "reading": "~ zu ni", "meaning": "without ~ing", "example": "朝ごはんを食べずに家を出ました。 (asagohan o tabezu ni ie o demashita) — I left home without eating breakfast.", "notes": "verb ない-stem + **ずに** = a formal/written ‘without doing ~’ (= 〜ないで). する→せずに (irregular).", "q": "", "focus": "ずに"}, {"id": "k2316f270a6", "level": "Level 8", "cat": "Grammar", "type": "grammar", "item": "〜べきだ", "reading": "~ beki da", "meaning": "should / ought to", "example": "もっと休むべきです。 (motto yasumu beki desu) — You should rest more.", "notes": "Dictionary form + **べきだ** = ‘should (morally/logically ought to)’. Stronger, more principled than 〜たほうがいい. する→すべき.", "q": "", "focus": "べきです"}, {"id": "k7da47bdc16", "level": "Level 8", "cat": "Grammar", "type": "grammar", "item": "〜である", "reading": "~ de aru", "meaning": "to be (formal / written)", "example": "これは重要な問題である。 (kore wa juuyou na mondai de aru) — This is an important issue.", "notes": "**である** = the formal, written-style copula (= です). Seen in essays, reports and news, not everyday speech.", "q": "", "focus": "である"}, {"id": "kfb8535f082", "level": "Level 8", "cat": "Grammar", "type": "grammar", "item": "〜わけだ", "reading": "~ wake da", "meaning": "that's why / it means that ~", "example": "電気がついている。だれかいるわけだ。 (denki ga tsuite iru. dareka iru wake da) — The light's on. So that means someone's here.", "notes": "Plain form + **わけだ** = drawing a logical conclusion, ‘so that means / no wonder’. 〜わけではない = ‘it doesn't mean that ~’.", "q": "", "focus": "わけだ"}, {"id": "k0dd7fbb2fe", "level": "Level 8", "cat": "Grammar", "type": "grammar", "item": "〜だろう", "reading": "~ darou", "meaning": "probably / I suppose", "example": "あしたは晴れるだろう。 (ashita wa hareru darou) — It'll probably be sunny tomorrow.", "notes": "Plain form + **だろう** = ‘probably / I bet’ (plain form of でしょう). With rising tone, seeks agreement.", "q": "", "focus": "だろう"}, {"id": "k3e6f9fbb02", "level": "Survival", "cat": "Getting around", "type": "vocab", "item": "じゅういち", "reading": "juuichi", "meaning": "eleven", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "k46f4555dd7", "level": "Surv em": "저", "reading": "jeo", "meaning": "I / me (humble)", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "k236201ad1c", "level": "Level 1", "cat": "Introductions", "type": "vocab", "item": "안녕", "reading": "annyeong", "meaning": "hi / bye (casual)", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "k74ca2d1720", "level": "Level 1", "cat": "Introductions", "type": "vocab", "item": "만나서 반갑습니다", "reading": "mannaseo bangapseumnida", "meaning": "nice to meet you", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "k7bf9ea0d9a", "level": "Level 1", "cat": "Introductions", "type": "vocab", "item": "이에요/예요", "reading": "ieyo / yeyo", "meaning": "to be (polite)", "example": "", "notes": "", "q": "", "focus": ""}, {"id": "ka98724796c", "level": "Level 1", "cat": "Particles", "type": "grammar", "item": "은/는", "reading": "eun / neun", "meaning": "topic marker", "example": "저는 학생이에요. (jeoneun haksaeng-ieyo) — I am a student.", "notes": "Topic marker: **은** after a consonant, **는** after a vowel (저는 = ‘as for me’). Marks the topic / known info — contrast with 이/가, which marks the subject. Pick one, don't use both.", "q": "Topic-marking particle (after consonant/vowel)?", "focus": "는"}, {"id": "k91cee1b642", "level": "Level 1", "cat": "Particles", "type": "grammar", "item": "을/를", "reading": "eul / reul", "meaning": "object marker", "example": "물을 마셔요. (mureul masyeoyo) — I drink water.", "notes": "Object marker: **을** after a consonant, **를** after a vowel (물을 = ‘water’ as object). Marks what the verb acts on; often dropped in casual speech.", "q": "Object-marking particle?", "focus": "을"}, {"id": "kf0d6617634", "level": "Level 1", "cat": "Particles", "type": "grammar", "item": "에", "reading": "e", "meaning": "to / at (place, time)", "example": "학교에 가요. (hakgyoe gayo) — I go to school.", "notes": "**에** = ‘to / at’ for a destination or a point in time (학교에 가요 = go to school; 3시에 = at 3). For where an action takes place, use 에서 instead.", "q": "Particle for destination or time?", "focus": "에"}, {"id": "kc805a17816", "level": "Level 1", "cat": "Particles", "type": "grammar", "item": "에서", "reading": "eseo", "meaning": "at / from (action)", "example": "집에서 밥을 먹어요. (jibeseo babeul meogeoyo) — I eat at home.", "notes": "**에서** = ‘at / in / from’ — where an action happens, or a starting point (집에서 먹어요 = eat at home). Use 에서 for the place of an action, 에 for a destination.", "q": "Particle for where an action happens?", "focus": "에서"}, {"id": "k70a59452b9", "level": "Level 1", "cat": "Conjugation", "type": "grammar", "item": "먹어요", "reading": "meogeoyo", "meaning": "polite present of 먹다", "example": "저는 밥을 먹어요. (jeoneun babeul meogeoyo) — I eat rice.", "notes": "Polite 해요-style present. Stem 먹- + **어요** (dark vowel ㅓ/ㅜ take 어요; bright ㅏ/ㅗ take 아요). Everyday polite speech.", "q": "Polite (해요) form of 먹다 (to eat)?", "focus": "어요"}, {"id": "k845c2fa839", "level": "Level 1", "cat": "Conjugation", "type": "grammar", "item": "마셔요", "reading": "masyeoyo", "meaning": "polite present of 마시다", "example": "커피를 마셔요. (keopireul masyeoyo) — I drink coffee.", "notes": "마시- + 어요 contracts to **마셔요**: when a stem ends in 이, 이 + 어 → 여. Common polite present.", "q": "Polite (해요) form of 마시다 (to drink)?", "focus": "셔요"}, {"id": "k2f5d4bfbb0", "level": "Level 1", "cat": "Conjugation", "type": "grammar", "item": "가요", "reading": "gayo", "meaning": "polite present of 가다", "example": "집에 가요. (jibe gayo) — I go home.", "notes": "가- + 아요 → **가요** (identical vowels merge). Polite present of 가다 (to go).", "q": "Polite (해요) form of 가다 (to go)?", "focus": "가요"}, {"id": "k6752d4d3a3", "level": "Level 1", "cat": "Conjugation", "type": "grammar", "item": "해요", "reading": "haeyo", "meaning": "polite present of 하다", "example": "숙제를 해요. (sukjereul haeyo) — I do my homework.", "notes": "하다 verbs are irregular — 하- becomes **해요** in the polite present. Every 하다 verb follows this (공부하다 → 공부해요).", "q": "Polite (해요) form of 하다 (to do)?", "focus": "해요"}, {"id" function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function today(){ return Math.floor(Date.now()/86400000); }
function readJSON(id,fb){ var r=(document.getElementById(id).textContent||"").trim(); if(!r) return fb; try{return JSON.parse(r);}catch(e){return fb;} }

function loadAll(){
  DB=readJSON("hub-data",null)||JSON.parse(JSON.stringify(SEED));
  PROG=readJSON("hub-progress",{ja:blankProg(),ko:blankProg()});
  UI=readJSON("hub-state",{lang:"ja",view:"home",theme:"matcha",romaji:false,autospeak:false,goal:20});
  // If this browser has newer auto-saved progress, prefer it over the embedded snapshot
  var embAt=(readJSON("hub-state",{}).at)||0, ls=null;
  try{ ls=JSON.parse(localStorage.getItem(LS_KEY)||"null"); }catch(e){}
  if(ls && (ls.at||0)>=embAt && ls.data){
    DB=ls.data; if(ls.prog)PROG=ls.prog; if(ls.ui){ Object.keys(ls.ui).forEach(function(k){ UI[k]=ls.ui[k]; }); }
  }
  if(!UI.lang)UI.lang="ja"; if(!UI.view)UI.view="home"; if(!UI.theme)UI.theme="matcha"; if(!UI.goal)UI.goal=20;
